<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Candy Crush Match-3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a0533 0%, #2d1b69 40%, #4a1a6b 70%, #1a0533 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #fff;
  overflow-x: hidden;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
#header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  padding: 16px 12px 8px;
  width: 100%;
  max-width: 500px;
  flex-wrap: wrap;
}
h1 {
  font-size: 1.6rem;
  background: linear-gradient(90deg, #ff6bca, #ffb347, #ff6bca);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 1px;
  width: 100%;
  text-align: center;
}
.stat {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 6px 18px;
  text-align: center;
  backdrop-filter: blur(4px);
}
.stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
.stat-value { font-size: 1.4rem; font-weight: 700; }
#board-container {
  position: relative;
  margin: 12px auto;
  padding: 8px;
  background: rgba(0,0,0,0.3);
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 3px;
  position: relative;
}
.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--emoji-size);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
  position: relative;
  border: 2px solid transparent;
}
.cell:active { transform: scale(0.92); }
.cell.selected {
  border-color: #fff;
  box-shadow: 0 0 16px rgba(255,255,255,0.6), 0 0 4px rgba(255,255,255,0.8);
  transform: scale(1.08);
  z-index: 2;
}
.cell.matched {
  animation: matchFlash 0.4s ease-out;
}
.cell.falling {
  transition: transform 0.25s ease-in;
}
.cell.swapping {
  transition: transform 0.2s ease-in-out;
  z-index: 3;
}
@keyframes matchFlash {
  0% { transform: scale(1); filter: brightness(1); }
  30% { transform: scale(1.3); filter: brightness(2); }
  60% { transform: scale(1.1); filter: brightness(1.5); }
  100% { transform: scale(0); filter: brightness(3); opacity: 0; }
}
@keyframes newTile {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.cell.new-tile {
  animation: newTile 0.3s ease-out;
}
.candy-0 { background: linear-gradient(135deg, #ff4757, #c44569); }
.candy-1 { background: linear-gradient(135deg, #ffa502, #e67e22); }
.candy-2 { background: linear-gradient(135deg, #2ed573, #009432); }
.candy-3 { background: linear-gradient(135deg, #1e90ff, #0652DD); }
.candy-4 { background: linear-gradient(135deg, #a55eea, #8854d0); }
.candy-5 { background: linear-gradient(135deg, #ff6b81, #ee5a24); }

#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}
#overlay.active { display: flex; }
#overlay-box {
  background: linear-gradient(135deg, #2d1b69, #4a1a6b);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
#overlay-box h2 { font-size: 1.8rem; margin-bottom: 8px; }
#overlay-box p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 20px; }
#restart-btn {
  background: linear-gradient(135deg, #ff6bca, #ff9a56);
  border: none;
  color: #fff;
  padding: 12px 36px;
  border-radius: 30px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: 0 4px 16px rgba(255,107,202,0.4);
  transition: transform 0.15s;
}
#restart-btn:hover { transform: scale(1.05); }
#restart-btn:active { transform: scale(0.97); }
#combo-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.5rem;
  font-weight: 900;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}
@keyframes comboPopup {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  70% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
}
</style>
</head>
<body>
<div id="header">
  <h1>Candy Crush</h1>
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves">0</div></div>
</div>
<div id="board-container">
  <div id="board"></div>
</div>
<div id="combo-text"></div>
<div id="overlay">
  <div id="overlay-box">
    <h2>Game Over!</h2>
    <p>No more moves available.<br>Final Score: <strong id="final-score">0</strong></p>
    <button id="restart-btn" onclick="initGame()">Play Again</button>
  </div>
</div>

<script>
const ROWS = 8, COLS = 8;
const CANDIES = ['🍬','🍭','🍡','💎','⭐','🔮'];
const CANDY_COUNT = CANDIES.length;

let board = [];
let score = 0;
let moves = 0;
let selected = null;
let animating = false;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');
const overlayEl = document.getElementById('overlay');
const finalScoreEl = document.getElementById('final-score');
const comboEl = document.getElementById('combo-text');

function setCellSize() {
  const vw = Math.min(window.innerWidth, 500);
  const cellSize = Math.floor((vw - 16 - 3 * 7) / 8);
  const emojiSize = Math.floor(cellSize * 0.55);
  document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
  document.documentElement.style.setProperty('--emoji-size', emojiSize + 'px');
}

function randomCandy() {
  return Math.floor(Math.random() * CANDY_COUNT);
}

function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let candy;
      do {
        candy = randomCandy();
      } while (
        (c >= 2 && board[r][c-1] === candy && board[r][c-2] === candy) ||
        (r >= 2 && board[r-1][c] === candy && board[r-2][c] === candy)
      );
      board[r][c] = candy;
    }
  }
}

function renderBoard(newTiles) {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell candy-' + board[r][c];
      cell.textContent = CANDIES[board[r][c]];
      cell.dataset.row = r;
      cell.dataset.col = c;
      if (newTiles && newTiles.has(r + ',' + c)) {
        cell.classList.add('new-tile');
      }
      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add('selected');
      }
      cell.addEventListener('click', () => onCellClick(r, c));
      setupTouch(cell, r, c);
      boardEl.appendChild(cell);
    }
  }
}

let touchStartX, touchStartY, touchRow, touchCol;

function setupTouch(cell, r, c) {
  cell.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchRow = r;
    touchCol = c;
  }, { passive: true });

  cell.addEventListener('touchend', (e) => {
    if (touchStartX == null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    touchStartX = null;

    if (absDx < 10 && absDy < 10) {
      onCellClick(r, c);
      return;
    }

    let tr, tc;
    if (absDx > absDy) {
      tr = touchRow;
      tc = touchCol + (dx > 0 ? 1 : -1);
    } else {
      tr = touchRow + (dy > 0 ? 1 : -1);
      tc = touchCol;
    }

    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      selected = { r: touchRow, c: touchCol };
      trySwap(tr, tc);
    }
  }, { passive: true });
}

function onCellClick(r, c) {
  if (animating) return;
  if (!selected) {
    selected = { r, c };
    renderBoard();
    return;
  }
  if (selected.r === r && selected.c === c) {
    selected = null;
    renderBoard();
    return;
  }
  const dr = Math.abs(selected.r - r);
  const dc = Math.abs(selected.c - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(r, c);
  } else {
    selected = { r, c };
    renderBoard();
  }
}

async function trySwap(r, c) {
  if (animating) return;
  animating = true;
  const sr = selected.r, sc = selected.c;
  selected = null;

  swap(sr, sc, r, c);
  renderBoard();

  const matches = findAllMatches();
  if (matches.length === 0) {
    swap(sr, sc, r, c);
    await sleep(200);
    renderBoard();
    animating = false;
    return;
  }

  moves++;
  movesEl.textContent = moves;
  await processMatches();
  animating = false;

  if (!hasValidMoves()) {
    await sleep(300);
    finalScoreEl.textContent = score;
    overlayEl.classList.add('active');
  }
}

function swap(r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

function findAllMatches() {
  const matched = new Set();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = board[r][c];
      if (t === board[r][c+1] && t === board[r][c+2]) {
        let end = c + 2;
        while (end + 1 < COLS && board[r][end+1] === t) end++;
        for (let i = c; i <= end; i++) matched.add(r + ',' + i);
      }
    }
  }

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = board[r][c];
      if (t === board[r+1][c] && t === board[r+2][c]) {
        let end = r + 2;
        while (end + 1 < ROWS && board[end+1][c] === t) end++;
        for (let i = r; i <= end; i++) matched.add(i + ',' + c);
      }
    }
  }

  return [...matched];
}

function scoreMatches(matches) {
  const groups = findMatchGroups();
  let pts = 0;
  for (const g of groups) {
    if (g.length === 3) pts += 30;
    else if (g.length === 4) pts += 60;
    else pts += 50 * g.length;
  }
  return pts;
}

function findMatchGroups() {
  const groups = [];

  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      let end = c;
      while (end + 1 < COLS && board[r][end+1] === board[r][c]) end++;
      if (end - c >= 2) {
        groups.push(Array.from({ length: end - c + 1 }, (_, i) => [r, c + i]));
      }
      c = end + 1;
    }
  }

  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      let end = r;
      while (end + 1 < ROWS && board[end+1][c] === board[r][c]) end++;
      if (end - r >= 2) {
        groups.push(Array.from({ length: end - r + 1 }, (_, i) => [r + i, c]));
      }
      r = end + 1;
    }
  }

  return groups;
}

async function processMatches() {
  let cascade = 0;
  while (true) {
    const matches = findAllMatches();
    if (matches.length === 0) break;

    cascade++;
    const pts = scoreMatches(matches);
    const multiplier = cascade > 1 ? cascade : 1;
    score += pts * multiplier;
    scoreEl.textContent = score;

    if (cascade > 1) showCombo(cascade);

    // Flash matched tiles
    const cells = boardEl.children;
    const matchSet = new Set(matches);
    for (const cell of cells) {
      const key = cell.dataset.row + ',' + cell.dataset.col;
      if (matchSet.has(key)) cell.classList.add('matched');
    }
    await sleep(400);

    // Remove matched and drop
    const newTiles = new Set();
    for (let c = 0; c < COLS; c++) {
      const matchedRows = [];
      for (const m of matches) {
        const [mr, mc] = m.split(',').map(Number);
        if (mc === c) matchedRows.push(mr);
      }
      if (matchedRows.length === 0) continue;
      matchedRows.sort((a, b) => a - b);

      const remaining = [];
      for (let r = 0; r < ROWS; r++) {
        if (!matchedRows.includes(r)) remaining.push(board[r][c]);
      }
      const newCount = ROWS - remaining.length;
      for (let i = 0; i < newCount; i++) {
        remaining.unshift(randomCandy());
        newTiles.add(i + ',' + c);
      }
      for (let r = 0; r < ROWS; r++) {
        board[r][c] = remaining[r];
      }
    }

    renderBoard(newTiles);
    await sleep(300);
  }
}

function showCombo(n) {
  const colors = ['#ff6bca', '#ffb347', '#2ed573', '#1e90ff', '#a55eea'];
  comboEl.textContent = n + 'x Combo!';
  comboEl.style.color = colors[(n - 1) % colors.length];
  comboEl.style.animation = 'none';
  comboEl.offsetHeight;
  comboEl.style.animation = 'comboPopup 1s ease-out forwards';
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        swap(r, c, r, c + 1);
        if (findAllMatches().length > 0) { swap(r, c, r, c + 1); return true; }
        swap(r, c, r, c + 1);
      }
      if (r + 1 < ROWS) {
        swap(r, c, r + 1, c);
        if (findAllMatches().length > 0) { swap(r, c, r + 1, c); return true; }
        swap(r, c, r + 1, c);
      }
    }
  }
  return false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function initGame() {
  score = 0; moves = 0;
  scoreEl.textContent = 0;
  movesEl.textContent = 0;
  selected = null;
  animating = false;
  overlayEl.classList.remove('active');
  createBoard();

  // Ensure no initial matches and board has valid moves
  let attempts = 0;
  while (findAllMatches().length > 0 || !hasValidMoves()) {
    createBoard();
    if (++attempts > 100) break;
  }

  renderBoard();
}

window.addEventListener('resize', () => { setCellSize(); renderBoard(); });
setCellSize();
initGame();
</script>
</body>
</html>
