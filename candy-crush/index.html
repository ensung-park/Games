<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Candy Crush Match-3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0533;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}
canvas {
  display: block;
  image-rendering: auto;
}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════════════════
// SECTION 1: CONSTANTS & CONFIGURATION
// ═══════════════════════════════════════════════════════

const ROWS = 8, COLS = 8;
const CANDY_TYPES = 6;
const EMPTY = -1;
const COLORS = [
  { main: '#ff4757', dark: '#c44569', light: '#ff6b81' },
  { main: '#ffa502', dark: '#e67e22', light: '#ffc048' },
  { main: '#2ed573', dark: '#009432', light: '#7bed9f' },
  { main: '#1e90ff', dark: '#0652DD', light: '#70a1ff' },
  { main: '#a55eea', dark: '#8854d0', light: '#c298f0' },
  { main: '#ff6348', dark: '#ee5a24', light: '#ff9478' },
];

const SPECIAL = { NONE: 0, STRIPED_H: 1, STRIPED_V: 2, WRAPPED: 3, COLOR_BOMB: 4 };
const BLOCKER = { NONE: 0, ICE1: 1, ICE2: 2, CHOCOLATE: 3, STONE: 4 };
const SHAPES = ['circle', 'diamond', 'square', 'triangle', 'pentagon', 'heart'];
const SCREEN = { LEVEL_SELECT: 0, PLAYING: 1, LEVEL_COMPLETE: 2, LEVEL_FAILED: 3 };

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H, cellSize, boardX, boardY, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cellSize = Math.floor(Math.min(W * 0.85, H * 0.50, 420) / COLS);
  boardX = Math.floor((W - cellSize * COLS) / 2);
  boardY = Math.floor(H * 0.25);
}

window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════
// SECTION 2: GAME STATE
// ═══════════════════════════════════════════════════════

const state = {
  screen: SCREEN.LEVEL_SELECT,
  board: [],
  score: 0,
  movesLeft: 0,
  totalMoves: 0,
  level: 1,
  cascade: 0,
  selected: null,
  animating: false,
  hintTimer: 0,
  hintMove: null,
  particles: [],
  floatingTexts: [],
  animations: [],
  shakeAmount: 0,
  shakeTime: 0,
  levelData: null,
  stars: 0,
  progress: {},
  bonusPhase: false,
};

function makeCell(type, special, blocker) {
  return { type: type, special: special || SPECIAL.NONE, blocker: blocker || BLOCKER.NONE };
}

function loadProgress() {
  try {
    const saved = localStorage.getItem('candyCrushProgress');
    if (saved) state.progress = JSON.parse(saved);
  } catch(e) {}
}

function saveProgress() {
  try {
    localStorage.setItem('candyCrushProgress', JSON.stringify(state.progress));
  } catch(e) {}
}

loadProgress();

// ═══════════════════════════════════════════════════════
// SECTION 3: AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════════

let audioCtx = null;
let soundEnabled = true;

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, delay) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const t = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol || 0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  } catch(e) {}
}

function playNoise(duration, vol, delay) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const t = audioCtx.currentTime + (delay || 0);
    const bufferSize = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol || 0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(t);
    src.stop(t + duration);
  } catch(e) {}
}

function sfxMatch(cascadeLevel) {
  const baseFreq = 400 + cascadeLevel * 80;
  playTone(baseFreq, 0.15, 'sine', 0.12);
  playTone(baseFreq * 1.25, 0.12, 'sine', 0.08, 0.05);
}

function sfxSpecialCreate() {
  playTone(500, 0.1, 'sine', 0.1);
  playTone(700, 0.1, 'sine', 0.1, 0.08);
  playTone(900, 0.15, 'sine', 0.1, 0.16);
}

function sfxExplosion() {
  playNoise(0.25, 0.12);
  playTone(120, 0.3, 'sine', 0.1);
}

function sfxSwap() {
  playTone(300, 0.08, 'sine', 0.08);
  playTone(400, 0.08, 'sine', 0.08, 0.04);
}

function sfxBadSwap() {
  playTone(200, 0.12, 'square', 0.06);
  playTone(150, 0.15, 'square', 0.06, 0.1);
}

function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.3, 'sine', 0.1, i * 0.12));
}

function sfxLose() {
  [400, 350, 300, 250].forEach((f, i) => playTone(f, 0.3, 'sine', 0.08, i * 0.15));
}

function sfxClick() {
  playTone(600, 0.05, 'sine', 0.06);
}

// ═══════════════════════════════════════════════════════
// SECTION 4: ANIMATION & PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════

function addParticle(x, y, color, count) {
  for (let i = 0; i < (count || 8); i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 150;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.4,
      maxLife: 0.4 + Math.random() * 0.4,
      size: 2 + Math.random() * 4,
      color: color,
    });
  }
}

function addConfetti(x, y, count) {
  for (let i = 0; i < (count || 30); i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 250;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 150,
      life: 1.0 + Math.random() * 1.0,
      maxLife: 1.0 + Math.random() * 1.0,
      size: 3 + Math.random() * 5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)].main,
    });
  }
}

function addFloatingText(x, y, text, color, size) {
  state.floatingTexts.push({
    x, y, text, color: color || '#fff',
    life: 1.2, maxLife: 1.2,
    vy: -70,
    size: size || Math.floor(cellSize * 0.4),
  });
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 250 * dt;
    p.life -= dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
  for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
    const ft = state.floatingTexts[i];
    ft.y += ft.vy * dt;
    ft.vy *= 0.97;
    ft.life -= dt;
    if (ft.life <= 0) state.floatingTexts.splice(i, 1);
  }
  if (state.shakeAmount > 0) {
    state.shakeTime += dt;
    state.shakeAmount *= Math.pow(0.05, dt);
    if (state.shakeAmount < 0.3) state.shakeAmount = 0;
  }
}

// ═══════════════════════════════════════════════════════
// SECTION 5: CANVAS RENDERING
// ═══════════════════════════════════════════════════════

function cellToScreen(r, c) {
  return {
    x: boardX + c * cellSize + cellSize / 2,
    y: boardY + r * cellSize + cellSize / 2,
  };
}

function drawRoundedRect(x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function drawCandyShape(x, y, r, type) {
  ctx.beginPath();
  switch(SHAPES[type]) {
    case 'circle':
      ctx.arc(x, y, r, 0, Math.PI * 2);
      break;
    case 'diamond':
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.85, y);
      ctx.lineTo(x, y + r);
      ctx.lineTo(x - r * 0.85, y);
      ctx.closePath();
      break;
    case 'square':
      drawRoundedRect(x - r * 0.75, y - r * 0.75, r * 1.5, r * 1.5, r * 0.22);
      break;
    case 'triangle':
      ctx.moveTo(x, y - r * 0.95);
      ctx.lineTo(x + r * 0.9, y + r * 0.65);
      ctx.lineTo(x - r * 0.9, y + r * 0.65);
      ctx.closePath();
      break;
    case 'pentagon':
      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + i * Math.PI * 2 / 5;
        const px = x + Math.cos(angle) * r;
        const py = y + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    case 'heart':
      ctx.moveTo(x, y + r * 0.65);
      ctx.bezierCurveTo(x - r * 1.2, y - r * 0.1, x - r * 0.6, y - r * 0.95, x, y - r * 0.35);
      ctx.bezierCurveTo(x + r * 0.6, y - r * 0.95, x + r * 1.2, y - r * 0.1, x, y + r * 0.65);
      break;
  }
}

function drawCandy(x, y, size, type, special, alpha) {
  if (type < 0 || type >= CANDY_TYPES) return;
  const col = COLORS[type];
  const r = size * 0.40;

  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(x + 1.5, y + 2, r, 0, Math.PI * 2);
  ctx.fill();

  // Main body
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.35, 0, x, y, r * 1.1);
  grad.addColorStop(0, col.light);
  grad.addColorStop(0.5, col.main);
  grad.addColorStop(1, col.dark);
  ctx.fillStyle = grad;
  drawCandyShape(x, y, r, type);
  ctx.fill();

  // Glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(x - r * 0.15, y - r * 0.28, r * 0.5, r * 0.3, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Special indicators
  if (special === SPECIAL.STRIPED_H) {
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1.5;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.65, y + i * (r * 0.22));
      ctx.lineTo(x + r * 0.65, y + i * (r * 0.22));
      ctx.stroke();
    }
  } else if (special === SPECIAL.STRIPED_V) {
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1.5;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * (r * 0.22), y - r * 0.65);
      ctx.lineTo(x + i * (r * 0.22), y + r * 0.65);
      ctx.stroke();
    }
  } else if (special === SPECIAL.WRAPPED) {
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.32, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawColorBomb(x, y, size, alpha) {
  const r = size * 0.40;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.arc(x + 1.5, y + 2, r, 0, Math.PI * 2);
  ctx.fill();

  // Rainbow segments
  const now = performance.now();
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + now * 0.002;
    ctx.fillStyle = COLORS[i].main;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, angle, angle + Math.PI / 3);
    ctx.closePath();
    ctx.fill();
  }

  // White center
  const centerGrad = ctx.createRadialGradient(x, y, 0, x, y, r * 0.35);
  centerGrad.addColorStop(0, '#fff');
  centerGrad.addColorStop(1, 'rgba(255,255,255,0.3)');
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Sparkle
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(x - r * 0.12, y - r * 0.2, r * 0.35, r * 0.2, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBlocker(x, y, size, blocker) {
  const r = size * 0.44;
  if (blocker === BLOCKER.ICE1 || blocker === BLOCKER.ICE2) {
    const alpha = blocker === BLOCKER.ICE2 ? 0.25 : 0.12;
    ctx.fillStyle = `rgba(180,230,255,${alpha})`;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 6);
    ctx.fill();
    ctx.strokeStyle = blocker === BLOCKER.ICE2 ? 'rgba(150,220,255,0.7)' : 'rgba(150,220,255,0.4)';
    ctx.lineWidth = blocker === BLOCKER.ICE2 ? 2.5 : 1.5;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 6);
    ctx.stroke();
    // Ice crack detail
    if (blocker === BLOCKER.ICE1) {
      ctx.strokeStyle = 'rgba(200,240,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - r * 0.3, y - r * 0.5);
      ctx.lineTo(x + r * 0.1, y);
      ctx.lineTo(x + r * 0.4, y + r * 0.3);
      ctx.stroke();
    }
  } else if (blocker === BLOCKER.CHOCOLATE) {
    const chocGrad = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r * 1.2);
    chocGrad.addColorStop(0, '#7b4a2b');
    chocGrad.addColorStop(1, '#3e210e');
    ctx.fillStyle = chocGrad;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 6);
    ctx.fill();
    // Chocolate texture
    ctx.fillStyle = 'rgba(90,50,20,0.5)';
    const seed = (Math.floor(x) * 31 + Math.floor(y) * 17);
    for (let i = 0; i < 5; i++) {
      const cx2 = x - r * 0.5 + ((seed * (i + 1) * 7) % 100) / 100 * r;
      const cy2 = y - r * 0.5 + ((seed * (i + 1) * 13) % 100) / 100 * r;
      ctx.beginPath();
      ctx.arc(cx2, cy2, 1.5 + (i % 3), 0, Math.PI * 2);
      ctx.fill();
    }
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(x - r * 0.2, y - r * 0.3, r * 0.5, r * 0.25, -0.3, 0, Math.PI * 2);
    ctx.fill();
  } else if (blocker === BLOCKER.STONE) {
    const stoneGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r * 1.3);
    stoneGrad.addColorStop(0, '#888');
    stoneGrad.addColorStop(1, '#444');
    ctx.fillStyle = stoneGrad;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 4);
    ctx.stroke();
    // Crack lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.5, y - r * 0.3);
    ctx.lineTo(x + r * 0.15, y + r * 0.05);
    ctx.lineTo(x + r * 0.5, y + r * 0.45);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + r * 0.15, y + r * 0.05);
    ctx.lineTo(x - r * 0.1, y + r * 0.5);
    ctx.stroke();
  }
}

function drawBoard() {
  if (state.screen !== SCREEN.PLAYING && state.screen !== SCREEN.LEVEL_COMPLETE && state.screen !== SCREEN.LEVEL_FAILED) return;

  const shk = state.shakeAmount;
  const sx = shk ? Math.sin(state.shakeTime * 40) * shk : 0;
  const sy = shk ? Math.cos(state.shakeTime * 35) * shk * 0.7 : 0;

  // Board background
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  drawRoundedRect(boardX - 10 + sx, boardY - 10 + sy, cellSize * COLS + 20, cellSize * ROWS + 20, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  drawRoundedRect(boardX - 10 + sx, boardY - 10 + sy, cellSize * COLS + 20, cellSize * ROWS + 20, 16);
  ctx.stroke();

  // Grid cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const pos = cellToScreen(r, c);
      const cx = pos.x + sx, cy = pos.y + sy;

      // Cell background
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.015)';
      drawRoundedRect(cx - cellSize / 2 + 1, cy - cellSize / 2 + 1, cellSize - 2, cellSize - 2, 5);
      ctx.fill();

      const cell = state.board[r] && state.board[r][c];
      if (!cell) continue;

      // Stone blocks the entire cell
      if (cell.blocker === BLOCKER.STONE) {
        drawBlocker(cx, cy, cellSize, BLOCKER.STONE);
        continue;
      }
      // Chocolate blocks the entire cell
      if (cell.blocker === BLOCKER.CHOCOLATE) {
        drawBlocker(cx, cy, cellSize, BLOCKER.CHOCOLATE);
        continue;
      }

      // Draw candy
      if (cell.type >= 0) {
        const drawX = cell.drawX !== undefined ? cell.drawX + sx : cx;
        const drawY = cell.drawY !== undefined ? cell.drawY + sy : cy;
        const scale = cell.scale !== undefined ? cell.scale : 1;
        const drawAlpha = cell.alpha !== undefined ? cell.alpha : 1;
        const drawSize = cellSize * scale;

        if (cell.special === SPECIAL.COLOR_BOMB) {
          drawColorBomb(drawX, drawY, drawSize, drawAlpha);
        } else {
          drawCandy(drawX, drawY, drawSize, cell.type, cell.special, drawAlpha);
        }
      }

      // Draw ice overlay on top of candy
      if (cell.blocker === BLOCKER.ICE1 || cell.blocker === BLOCKER.ICE2) {
        drawBlocker(cx, cy, cellSize, cell.blocker);
      }
    }
  }

  // Selected cell highlight
  if (state.selected && state.screen === SCREEN.PLAYING) {
    const pos = cellToScreen(state.selected.r, state.selected.c);
    const pulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.008);
    ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    drawRoundedRect(pos.x - cellSize / 2 + 3 + sx, pos.y - cellSize / 2 + 3 + sy, cellSize - 6, cellSize - 6, 7);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Hint highlight
  if (state.hintMove && !state.selected && !state.animating && state.screen === SCREEN.PLAYING) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.006);
    ctx.strokeStyle = `rgba(255,255,100,${0.2 + pulse * 0.5})`;
    ctx.lineWidth = 2;
    const h1 = cellToScreen(state.hintMove.r, state.hintMove.c);
    drawRoundedRect(h1.x - cellSize / 2 + 4 + sx, h1.y - cellSize / 2 + 4 + sy, cellSize - 8, cellSize - 8, 7);
    ctx.stroke();
    const h2 = cellToScreen(state.hintMove.r2, state.hintMove.c2);
    drawRoundedRect(h2.x - cellSize / 2 + 4 + sx, h2.y - cellSize / 2 + 4 + sy, cellSize - 8, cellSize - 8, 7);
    ctx.stroke();
  }
}

function drawParticles() {
  for (const p of state.particles) {
    const alpha = Math.min(1, p.life / p.maxLife * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * Math.min(1, p.life / p.maxLife + 0.3), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  for (const ft of state.floatingTexts) {
    const alpha = Math.min(1, ft.life / ft.maxLife * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  if (state.screen !== SCREEN.PLAYING && state.screen !== SCREEN.LEVEL_COMPLETE && state.screen !== SCREEN.LEVEL_FAILED) return;
  if (!state.levelData) return;

  const ld = state.levelData;

  // Level title
  const titleGrad = ctx.createLinearGradient(W / 2 - 80, 0, W / 2 + 80, 0);
  titleGrad.addColorStop(0, '#ff6bca');
  titleGrad.addColorStop(0.5, '#ffb347');
  titleGrad.addColorStop(1, '#ff6bca');
  ctx.fillStyle = titleGrad;
  ctx.font = `bold ${Math.floor(cellSize * 0.42)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Level ${state.level}`, W / 2, boardY * 0.2);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.floor(cellSize * 0.55)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText(state.score.toLocaleString(), W / 2, boardY * 0.48);

  // Moves left
  ctx.font = `${Math.floor(cellSize * 0.3)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = state.movesLeft <= 5 ? '#ff4757' : state.movesLeft <= 10 ? '#ffa502' : '#aaa';
  ctx.fillText(`${state.movesLeft} moves left`, W / 2, boardY * 0.7);

  // Star progress bar
  const maxScore = ld.stars[2];
  const barW = cellSize * COLS;
  const barH = 6;
  const barX = boardX;
  const barY = boardY - 12;

  // Bar background
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  drawRoundedRect(barX, barY, barW, barH, 3);
  ctx.fill();

  // Bar fill
  const fillRatio = Math.min(state.score / maxScore, 1);
  if (fillRatio > 0) {
    const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    barGrad.addColorStop(0, '#ff6bca');
    barGrad.addColorStop(1, '#ffb347');
    ctx.fillStyle = barGrad;
    drawRoundedRect(barX, barY, Math.max(barW * fillRatio, barH), barH, 3);
    ctx.fill();
  }

  // Star markers on bar
  ctx.font = `${Math.floor(cellSize * 0.28)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (let i = 0; i < 3; i++) {
    const sx = barX + (ld.stars[i] / maxScore) * barW;
    ctx.fillStyle = state.score >= ld.stars[i] ? '#ffa502' : '#555';
    ctx.fillText('★', sx, barY - 1);
  }

  // Back button (top left)
  if (state.screen === SCREEN.PLAYING) {
    ctx.font = `${Math.floor(cellSize * 0.35)}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('← Menu', 12, 12);
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, W * 0.3, H);
  grad.addColorStop(0, '#1a0533');
  grad.addColorStop(0.35, '#2d1b69');
  grad.addColorStop(0.65, '#4a1a6b');
  grad.addColorStop(1, '#1a0533');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════
// SECTION 6: GAME LOGIC
// ═══════════════════════════════════════════════════════

function randomCandy() {
  return Math.floor(Math.random() * CANDY_TYPES);
}

function createBoard(levelData) {
  state.board = [];
  for (let r = 0; r < ROWS; r++) {
    state.board[r] = [];
    for (let c = 0; c < COLS; c++) {
      const blocker = (levelData && levelData.blockers && levelData.blockers[r] && levelData.blockers[r][c]) || BLOCKER.NONE;
      if (blocker === BLOCKER.STONE) {
        state.board[r][c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.STONE);
        continue;
      }
      if (blocker === BLOCKER.CHOCOLATE) {
        state.board[r][c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.CHOCOLATE);
        continue;
      }
      let type;
      let attempts = 0;
      do {
        type = randomCandy();
        attempts++;
      } while (
        attempts < 50 &&
        ((c >= 2 && state.board[r][c-1].type === type && state.board[r][c-2].type === type) ||
         (r >= 2 && state.board[r-1][c].type === type && state.board[r-2][c].type === type))
      );
      state.board[r][c] = makeCell(type, SPECIAL.NONE, blocker);
    }
  }
}

function isPlayable(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
  const cell = state.board[r][c];
  return cell && cell.type >= 0 && cell.blocker !== BLOCKER.STONE && cell.blocker !== BLOCKER.CHOCOLATE;
}

function findMatchGroups() {
  const groups = [];
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      if (!isPlayable(r, c)) { c++; continue; }
      let end = c;
      while (end + 1 < COLS && isPlayable(r, end + 1) && state.board[r][end + 1].type === state.board[r][c].type) end++;
      if (end - c >= 2) {
        groups.push({ cells: Array.from({ length: end - c + 1 }, (_, i) => ({ r, c: c + i })), dir: 'h' });
      }
      c = end + 1;
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      if (!isPlayable(r, c)) { r++; continue; }
      let end = r;
      while (end + 1 < ROWS && isPlayable(end + 1, c) && state.board[end + 1][c].type === state.board[r][c].type) end++;
      if (end - r >= 2) {
        groups.push({ cells: Array.from({ length: end - r + 1 }, (_, i) => ({ r: r + i, c })), dir: 'v' });
      }
      r = end + 1;
    }
  }
  return groups;
}

function findAllMatchedCells() {
  const groups = findMatchGroups();
  const set = new Set();
  for (const g of groups) {
    for (const cell of g.cells) set.add(cell.r + ',' + cell.c);
  }
  return [...set];
}

function detectSpecials(groups) {
  const specials = [];
  const specialAt = new Set();

  // Check for L/T shapes (intersecting horizontal + vertical groups)
  for (let i = 0; i < groups.length; i++) {
    for (let j = i + 1; j < groups.length; j++) {
      if (groups[i].dir === groups[j].dir) continue;
      for (const c1 of groups[i].cells) {
        for (const c2 of groups[j].cells) {
          if (c1.r === c2.r && c1.c === c2.c) {
            const key = c1.r + ',' + c1.c;
            if (!specialAt.has(key)) {
              specialAt.add(key);
              specials.push({ r: c1.r, c: c1.c, special: SPECIAL.WRAPPED, type: state.board[c1.r][c1.c].type });
            }
          }
        }
      }
    }
  }

  for (const g of groups) {
    if (g.cells.length >= 5) {
      const mid = g.cells[Math.floor(g.cells.length / 2)];
      const key = mid.r + ',' + mid.c;
      if (!specialAt.has(key)) {
        specialAt.add(key);
        specials.push({ r: mid.r, c: mid.c, special: SPECIAL.COLOR_BOMB, type: state.board[mid.r][mid.c].type });
      }
    } else if (g.cells.length === 4) {
      // Place at the second cell (or first non-special)
      let placed = false;
      for (const cell of g.cells) {
        const key = cell.r + ',' + cell.c;
        if (!specialAt.has(key)) {
          specialAt.add(key);
          specials.push({
            r: cell.r, c: cell.c,
            special: g.dir === 'h' ? SPECIAL.STRIPED_V : SPECIAL.STRIPED_H,
            type: state.board[cell.r][cell.c].type,
          });
          placed = true;
          break;
        }
      }
    }
  }

  return specials;
}

function getSpecialRemoval(r, c, special) {
  const toRemove = new Set();
  if (special === SPECIAL.STRIPED_H) {
    for (let cc = 0; cc < COLS; cc++) {
      if (state.board[r][cc].blocker !== BLOCKER.STONE) toRemove.add(r + ',' + cc);
    }
  } else if (special === SPECIAL.STRIPED_V) {
    for (let rr = 0; rr < ROWS; rr++) {
      if (state.board[rr][c].blocker !== BLOCKER.STONE) toRemove.add(rr + ',' + c);
    }
  } else if (special === SPECIAL.WRAPPED) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker !== BLOCKER.STONE) {
          toRemove.add(nr + ',' + nc);
        }
      }
    }
  }
  return toRemove;
}

function getColorBombRemoval(r, c, targetType) {
  const toRemove = new Set();
  toRemove.add(r + ',' + c);
  for (let rr = 0; rr < ROWS; rr++) {
    for (let cc = 0; cc < COLS; cc++) {
      if (state.board[rr][cc].type === targetType) {
        toRemove.add(rr + ',' + cc);
      }
    }
  }
  return toRemove;
}

function handleSpecialCombo(r1, c1, r2, c2) {
  const s1 = state.board[r1][c1].special;
  const s2 = state.board[r2][c2].special;
  if (s1 === SPECIAL.NONE && s2 === SPECIAL.NONE) return null;

  const toRemove = new Set();
  const isStriped = s => s === SPECIAL.STRIPED_H || s === SPECIAL.STRIPED_V;

  // Color bomb + Color bomb
  if (s1 === SPECIAL.COLOR_BOMB && s2 === SPECIAL.COLOR_BOMB) {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (state.board[r][c].type >= 0 || state.board[r][c].blocker === BLOCKER.CHOCOLATE)
          toRemove.add(r + ',' + c);
    return toRemove;
  }

  // Color bomb + striped
  if (s1 === SPECIAL.COLOR_BOMB && isStriped(s2)) {
    const targetType = state.board[r2][c2].type;
    toRemove.add(r1 + ',' + c1);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (state.board[r][c].type === targetType) {
          state.board[r][c].special = Math.random() > 0.5 ? SPECIAL.STRIPED_H : SPECIAL.STRIPED_V;
          const extra = getSpecialRemoval(r, c, state.board[r][c].special);
          for (const e of extra) toRemove.add(e);
          toRemove.add(r + ',' + c);
        }
    return toRemove;
  }
  if (s2 === SPECIAL.COLOR_BOMB && isStriped(s1)) {
    const targetType = state.board[r1][c1].type;
    toRemove.add(r2 + ',' + c2);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (state.board[r][c].type === targetType) {
          state.board[r][c].special = Math.random() > 0.5 ? SPECIAL.STRIPED_H : SPECIAL.STRIPED_V;
          const extra = getSpecialRemoval(r, c, state.board[r][c].special);
          for (const e of extra) toRemove.add(e);
          toRemove.add(r + ',' + c);
        }
    return toRemove;
  }

  // Color bomb + wrapped
  if (s1 === SPECIAL.COLOR_BOMB && s2 === SPECIAL.WRAPPED) {
    const targetType = state.board[r2][c2].type;
    toRemove.add(r1 + ',' + c1);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (state.board[r][c].type === targetType) {
          const extra = getSpecialRemoval(r, c, SPECIAL.WRAPPED);
          for (const e of extra) toRemove.add(e);
          toRemove.add(r + ',' + c);
        }
    return toRemove;
  }
  if (s2 === SPECIAL.COLOR_BOMB && s1 === SPECIAL.WRAPPED) {
    const targetType = state.board[r1][c1].type;
    toRemove.add(r2 + ',' + c2);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (state.board[r][c].type === targetType) {
          const extra = getSpecialRemoval(r, c, SPECIAL.WRAPPED);
          for (const e of extra) toRemove.add(e);
          toRemove.add(r + ',' + c);
        }
    return toRemove;
  }

  // Color bomb + normal
  if (s1 === SPECIAL.COLOR_BOMB) {
    const cells = getColorBombRemoval(r1, c1, state.board[r2][c2].type);
    for (const c of cells) toRemove.add(c);
    return toRemove;
  }
  if (s2 === SPECIAL.COLOR_BOMB) {
    const cells = getColorBombRemoval(r2, c2, state.board[r1][c1].type);
    for (const c of cells) toRemove.add(c);
    return toRemove;
  }

  // Striped + Striped = cross
  if (isStriped(s1) && isStriped(s2)) {
    for (let cc = 0; cc < COLS; cc++) {
      if (state.board[r1][cc].blocker !== BLOCKER.STONE) toRemove.add(r1 + ',' + cc);
      if (state.board[r2][cc].blocker !== BLOCKER.STONE) toRemove.add(r2 + ',' + cc);
    }
    for (let rr = 0; rr < ROWS; rr++) {
      if (state.board[rr][c1].blocker !== BLOCKER.STONE) toRemove.add(rr + ',' + c1);
      if (state.board[rr][c2].blocker !== BLOCKER.STONE) toRemove.add(rr + ',' + c2);
    }
    return toRemove;
  }

  // Wrapped + Wrapped = 5x5
  if (s1 === SPECIAL.WRAPPED && s2 === SPECIAL.WRAPPED) {
    const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2);
    for (let dr = -2; dr <= 2; dr++)
      for (let dc = -2; dc <= 2; dc++) {
        const nr = cr + dr, nc = cc + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker !== BLOCKER.STONE)
          toRemove.add(nr + ',' + nc);
      }
    return toRemove;
  }

  // Striped + Wrapped = 3 rows + 3 cols
  if ((isStriped(s1) && s2 === SPECIAL.WRAPPED) || (s1 === SPECIAL.WRAPPED && isStriped(s2))) {
    const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2);
    for (let d = -1; d <= 1; d++) {
      for (let i = 0; i < COLS; i++) {
        const nr = cr + d;
        if (nr >= 0 && nr < ROWS && state.board[nr][i].blocker !== BLOCKER.STONE) toRemove.add(nr + ',' + i);
      }
      for (let i = 0; i < ROWS; i++) {
        const nc = cc + d;
        if (nc >= 0 && nc < COLS && state.board[i][nc].blocker !== BLOCKER.STONE) toRemove.add(i + ',' + nc);
      }
    }
    return toRemove;
  }

  // One special + one normal: activate the special during match processing
  // But if it's a striped/wrapped being swapped without making a match, still allow swap
  // The special will be activated if its cell is part of a match
  return null;
}

function swap(r1, c1, r2, c2) {
  const tmp = state.board[r1][c1];
  state.board[r1][c1] = state.board[r2][c2];
  state.board[r2][c2] = tmp;
}

function gravity() {
  const newTiles = [];
  for (let c = 0; c < COLS; c++) {
    // Process sections separated by blockers independently
    // Find blocker positions in this column
    const blockerRows = new Set();
    for (let r = 0; r < ROWS; r++) {
      const cell = state.board[r][c];
      if (cell.blocker === BLOCKER.STONE || cell.blocker === BLOCKER.CHOCOLATE) {
        blockerRows.add(r);
      }
    }

    // Process each section (from bottom of section upward)
    let sectionEnd = ROWS - 1;
    while (sectionEnd >= 0) {
      if (blockerRows.has(sectionEnd)) {
        sectionEnd--;
        continue;
      }
      // Find the top of this section
      let sectionStart = sectionEnd;
      while (sectionStart > 0 && !blockerRows.has(sectionStart - 1)) {
        sectionStart--;
      }

      // Compact candies downward within this section
      let writePos = sectionEnd;
      for (let r = sectionEnd; r >= sectionStart; r--) {
        const cell = state.board[r][c];
        if (cell.type >= 0) {
          if (r !== writePos) {
            state.board[writePos][c] = cell;
            state.board[r][c] = makeCell(EMPTY);
          }
          writePos--;
        }
      }
      // Fill empty cells from top of section
      for (let r = writePos; r >= sectionStart; r--) {
        if (state.board[r][c].type === EMPTY && state.board[r][c].blocker === BLOCKER.NONE) {
          state.board[r][c] = makeCell(randomCandy());
          newTiles.push({ r, c });
        }
      }

      sectionEnd = sectionStart - 1;
    }
  }
  return newTiles;
}

function spreadChocolate() {
  const chocCells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (state.board[r][c].blocker === BLOCKER.CHOCOLATE) chocCells.push({ r, c });

  if (chocCells.length === 0) return false;

  const candidates = [];
  for (const { r, c } of chocCells) {
    for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
          state.board[nr][nc].type >= 0 && state.board[nr][nc].blocker === BLOCKER.NONE) {
        candidates.push({ r: nr, c: nc });
      }
    }
  }
  if (candidates.length > 0) {
    const target = candidates[Math.floor(Math.random() * candidates.length)];
    state.board[target.r][target.c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.CHOCOLATE);
    const pos = cellToScreen(target.r, target.c);
    addParticle(pos.x, pos.y, '#5c3317', 4);
    return true;
  }
  return false;
}

function clearAdjacentChocolate(matchedSet) {
  const removed = [];
  for (const key of matchedSet) {
    const [r, c] = key.split(',').map(Number);
    for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker === BLOCKER.CHOCOLATE) {
        const chocKey = nr + ',' + nc;
        if (!removed.some(x => x.r === nr && x.c === nc)) {
          removed.push({ r: nr, c: nc });
        }
      }
    }
  }
  for (const { r, c } of removed) {
    state.board[r][c] = makeCell(EMPTY);
    const pos = cellToScreen(r, c);
    addParticle(pos.x, pos.y, '#7b4a2b', 8);
    addFloatingText(pos.x, pos.y, '💥', '#ffb347');
  }
  return removed.length > 0;
}

function clearIceAt(r, c) {
  const cell = state.board[r][c];
  if (cell.blocker === BLOCKER.ICE2) {
    cell.blocker = BLOCKER.ICE1;
    const pos = cellToScreen(r, c);
    addParticle(pos.x, pos.y, '#aaddff', 4);
    return true;
  } else if (cell.blocker === BLOCKER.ICE1) {
    cell.blocker = BLOCKER.NONE;
    const pos = cellToScreen(r, c);
    addParticle(pos.x, pos.y, '#aaddff', 6);
    return true;
  }
  return false;
}

async function processMatches() {
  let cascade = 0;
  let clearedChocolateThisTurn = false;

  while (true) {
    const groups = findMatchGroups();
    const allMatched = findAllMatchedCells();
    if (allMatched.length === 0) break;

    cascade++;
    state.cascade = cascade;

    // Detect specials
    const specials = detectSpecials(groups);

    // Score
    let pts = 0;
    for (const g of groups) {
      if (g.cells.length === 3) pts += 30;
      else if (g.cells.length === 4) pts += 60;
      else pts += 50 * g.cells.length;
    }
    pts += specials.length * 50;
    const multiplier = cascade > 1 ? cascade : 1;
    state.score += pts * multiplier;

    sfxMatch(cascade);

    if (cascade > 1) {
      state.shakeAmount = Math.min(cascade * 3, 12);
      state.shakeTime = 0;
      addFloatingText(W / 2, boardY - 30, cascade + 'x COMBO!', '#ff6bca', Math.floor(cellSize * 0.5));
    }

    // Activate specials that are being destroyed
    const matchedSet = new Set(allMatched);
    const specialPositions = new Set(specials.map(s => s.r + ',' + s.c));
    const extraRemove = new Set();

    for (const key of matchedSet) {
      if (specialPositions.has(key)) continue;
      const [r, c] = key.split(',').map(Number);
      const cell = state.board[r][c];
      if (cell.special !== SPECIAL.NONE && cell.special !== SPECIAL.COLOR_BOMB) {
        sfxExplosion();
        const extra = getSpecialRemoval(r, c, cell.special);
        for (const e of extra) extraRemove.add(e);
        const pos = cellToScreen(r, c);
        addParticle(pos.x, pos.y, '#fff', 12);
        state.shakeAmount = Math.max(state.shakeAmount, 8);
        state.shakeTime = 0;
      }
    }
    for (const e of extraRemove) matchedSet.add(e);

    // Chain: if extra removal hits more specials
    const chainCheck = new Set(extraRemove);
    for (const key of chainCheck) {
      if (matchedSet.has(key)) {
        const [r, c] = key.split(',').map(Number);
        const cell = state.board[r][c];
        if (cell.special !== SPECIAL.NONE && cell.special !== SPECIAL.COLOR_BOMB && !specialPositions.has(key)) {
          const extra2 = getSpecialRemoval(r, c, cell.special);
          for (const e of extra2) matchedSet.add(e);
          sfxExplosion();
        }
      }
    }

    // Clear adjacent chocolate
    if (clearAdjacentChocolate(matchedSet)) {
      clearedChocolateThisTurn = true;
    }

    // Particles for matches
    for (const key of matchedSet) {
      const [r, c] = key.split(',').map(Number);
      const cell = state.board[r][c];
      if (cell.type >= 0) {
        const pos = cellToScreen(r, c);
        addParticle(pos.x, pos.y, COLORS[cell.type % CANDY_TYPES].main, 5);
      }
    }

    // Score popup
    if (groups.length > 0) {
      const midGroup = groups[0].cells[Math.floor(groups[0].cells.length / 2)];
      const pos = cellToScreen(midGroup.r, midGroup.c);
      addFloatingText(pos.x, pos.y - 5, '+' + (pts * multiplier), cascade > 1 ? '#ffb347' : '#fff');
    }

    // Remove matched cells but preserve new specials
    for (const key of matchedSet) {
      const [r, c] = key.split(',').map(Number);
      if (specialPositions.has(key)) continue;
      clearIceAt(r, c);
      if (state.board[r][c].blocker === BLOCKER.CHOCOLATE) {
        state.board[r][c] = makeCell(EMPTY);
      } else if (state.board[r][c].blocker !== BLOCKER.STONE) {
        state.board[r][c] = makeCell(EMPTY);
      }
    }

    // Place specials
    for (const s of specials) {
      state.board[s.r][s.c] = makeCell(s.type, s.special);
      sfxSpecialCreate();
      const pos = cellToScreen(s.r, s.c);
      addParticle(pos.x, pos.y, '#fff', 8);
    }

    await sleep(280);

    // Gravity
    gravity();
    await sleep(220);
  }

  // Spread chocolate if none was cleared
  if (!clearedChocolateThisTurn) {
    spreadChocolate();
  }

  state.cascade = 0;
}

async function endOfLevelBonus() {
  state.bonusPhase = true;
  const bonusMoves = Math.max(state.movesLeft, 0);
  if (bonusMoves === 0) { state.bonusPhase = false; return; }
  for (let i = 0; i < bonusMoves; i++) {
    const playable = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (isPlayable(r, c)) playable.push({ r, c });
    if (playable.length === 0) break;

    const target = playable[Math.floor(Math.random() * playable.length)];
    const specTypes = [SPECIAL.STRIPED_H, SPECIAL.STRIPED_V, SPECIAL.WRAPPED];
    const specType = specTypes[Math.floor(Math.random() * specTypes.length)];
    state.board[target.r][target.c].special = specType;

    const removed = getSpecialRemoval(target.r, target.c, specType);
    sfxExplosion();
    state.shakeAmount = 5;
    state.shakeTime = 0;

    for (const key of removed) {
      const [rr, cc] = key.split(',').map(Number);
      if (state.board[rr][cc].type >= 0 && state.board[rr][cc].blocker !== BLOCKER.STONE) {
        const pos = cellToScreen(rr, cc);
        addParticle(pos.x, pos.y, COLORS[state.board[rr][cc].type % CANDY_TYPES].main, 4);
        state.board[rr][cc] = makeCell(EMPTY);
      }
    }
    state.score += removed.size * 20;
    state.movesLeft--;

    const pos = cellToScreen(target.r, target.c);
    addFloatingText(pos.x, pos.y, '+' + (removed.size * 20), '#ffb347');

    await sleep(180);
    gravity();
    await sleep(120);
  }
  state.bonusPhase = false;
}

async function trySwap(r, c) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;
  state.animating = true;
  const sr = state.selected.r, sc = state.selected.c;
  state.selected = null;
  state.hintTimer = 0;
  state.hintMove = null;

  ensureAudio();

  // Check for special combo
  const comboResult = handleSpecialCombo(sr, sc, r, c);
  if (comboResult) {
    sfxSwap();
    swap(sr, sc, r, c);
    state.movesLeft--;

    sfxExplosion();
    state.shakeAmount = 12;
    state.shakeTime = 0;

    for (const key of comboResult) {
      const [rr, cc] = key.split(',').map(Number);
      if (state.board[rr][cc].blocker === BLOCKER.STONE) continue;
      clearIceAt(rr, cc);
      const pos = cellToScreen(rr, cc);
      if (state.board[rr][cc].type >= 0) {
        addParticle(pos.x, pos.y, COLORS[state.board[rr][cc].type % CANDY_TYPES].main, 6);
      } else if (state.board[rr][cc].blocker === BLOCKER.CHOCOLATE) {
        addParticle(pos.x, pos.y, '#7b4a2b', 6);
      }
      state.board[rr][cc] = makeCell(EMPTY);
    }
    state.score += comboResult.size * 30;
    addFloatingText(W / 2, H / 2, '+' + (comboResult.size * 30), '#ff6bca', Math.floor(cellSize * 0.6));

    await sleep(350);
    gravity();
    await sleep(250);
    await processMatches();
    state.animating = false;
    await checkLevelEnd();
    return;
  }

  // Normal swap
  swap(sr, sc, r, c);
  const matches = findAllMatchedCells();

  if (matches.length === 0) {
    sfxBadSwap();
    swap(sr, sc, r, c);
    await sleep(200);
    state.animating = false;
    return;
  }

  sfxSwap();
  state.movesLeft--;

  await processMatches();
  state.animating = false;

  await checkLevelEnd();
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!isPlayable(r, c)) continue;
      // Color bombs can always be swapped
      if (state.board[r][c].special === SPECIAL.COLOR_BOMB) {
        for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && isPlayable(nr, nc)) {
            return { r, c, r2: nr, c2: nc };
          }
        }
      }
      if (c + 1 < COLS && isPlayable(r, c + 1)) {
        swap(r, c, r, c + 1);
        const has = findAllMatchedCells().length > 0;
        swap(r, c, r, c + 1);
        if (has) return { r, c, r2: r, c2: c + 1 };
      }
      if (r + 1 < ROWS && isPlayable(r + 1, c)) {
        swap(r, c, r + 1, c);
        const has = findAllMatchedCells().length > 0;
        swap(r, c, r + 1, c);
        if (has) return { r, c, r2: r + 1, c2: c };
      }
    }
  }
  return null;
}

function shuffleBoard() {
  const playable = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (isPlayable(r, c) && state.board[r][c].special === SPECIAL.NONE)
        playable.push({ r, c });

  for (let i = playable.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const a = playable[i], b = playable[j];
    const tmpType = state.board[a.r][a.c].type;
    state.board[a.r][a.c].type = state.board[b.r][b.c].type;
    state.board[b.r][b.c].type = tmpType;
  }

  // Ensure no initial matches after shuffle
  let attempts = 0;
  while (findAllMatchedCells().length > 0 && attempts < 200) {
    const a = playable[Math.floor(Math.random() * playable.length)];
    state.board[a.r][a.c].type = randomCandy();
    attempts++;
  }
}

async function checkLevelEnd() {
  if (state.screen !== SCREEN.PLAYING) return;
  const ld = state.levelData;

  if (state.movesLeft <= 0) {
    if (state.score >= ld.stars[0]) {
      // Win! (no moves left, but score met)
      await showWin();
    } else {
      state.screen = SCREEN.LEVEL_FAILED;
      sfxLose();
    }
    return;
  }

  // Check if score target met with moves remaining — win with bonus!
  // Only trigger once score crosses the 1-star threshold for the first time
  // We don't auto-win mid-game; player keeps playing until out of moves.

  // Auto-shuffle if no valid moves
  const validMove = hasValidMoves();
  if (!validMove) {
    shuffleBoard();
    addFloatingText(W / 2, H / 2, 'SHUFFLE!', '#ffb347', Math.floor(cellSize * 0.6));
    // Check again after shuffle
    if (!hasValidMoves()) {
      shuffleBoard();
    }
  }
}

async function showWin() {
  // Run end-of-level bonus: convert remaining moves to specials
  if (state.movesLeft > 0) {
    await endOfLevelBonus();
  }

  const ld = state.levelData;
  const earnedStars = state.score >= ld.stars[2] ? 3 : state.score >= ld.stars[1] ? 2 : 1;
  state.stars = earnedStars;
  const prev = state.progress[state.level] || 0;
  if (earnedStars > prev) {
    state.progress[state.level] = earnedStars;
    saveProgress();
  }
  state.screen = SCREEN.LEVEL_COMPLETE;
  sfxWin();
  addConfetti(W / 2, H * 0.35, 40);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════
// SECTION 7: LEVEL DEFINITIONS
// ═══════════════════════════════════════════════════════

function placeRandomBlockers(blockers, type, count) {
  let placed = 0, attempts = 0;
  while (placed < count && attempts < 300) {
    const r = 1 + Math.floor(Math.random() * (ROWS - 2));
    const c = 1 + Math.floor(Math.random() * (COLS - 2));
    if (blockers[r][c] === BLOCKER.NONE) {
      blockers[r][c] = type;
      placed++;
    }
    attempts++;
  }
}

function generateLevels() {
  const levels = [];

  for (let i = 1; i <= 30; i++) {
    const tier = i <= 10 ? 'easy' : i <= 20 ? 'medium' : 'hard';
    let totalMoves;
    if (tier === 'easy') totalMoves = 40 - Math.floor(i * 0.7);
    else if (tier === 'medium') totalMoves = 30 - Math.floor((i - 10) * 0.5);
    else totalMoves = 25 - Math.floor((i - 20) * 0.4);
    totalMoves = Math.max(totalMoves, 15);

    const baseScore = 400 + i * 250;
    const stars = [
      baseScore,
      Math.floor(baseScore * 1.7),
      Math.floor(baseScore * 2.6),
    ];

    const blockers = Array.from({ length: ROWS }, () => Array(COLS).fill(BLOCKER.NONE));

    if (i >= 8 && i <= 10) {
      placeRandomBlockers(blockers, BLOCKER.ICE1, 2 + Math.floor((i - 7) * 1.2));
    } else if (i >= 11 && i <= 13) {
      placeRandomBlockers(blockers, BLOCKER.ICE1, 3 + Math.floor((i - 10) * 0.8));
      placeRandomBlockers(blockers, BLOCKER.ICE2, 1 + Math.floor((i - 10) * 0.7));
    } else if (i >= 14 && i <= 19) {
      placeRandomBlockers(blockers, BLOCKER.CHOCOLATE, 1 + Math.floor((i - 13) * 0.7));
      placeRandomBlockers(blockers, BLOCKER.ICE1, 2 + Math.floor((i - 13) * 0.5));
    } else if (i >= 20) {
      placeRandomBlockers(blockers, BLOCKER.STONE, 1 + Math.floor((i - 19) * 0.4));
      placeRandomBlockers(blockers, BLOCKER.CHOCOLATE, 1 + Math.floor((i - 19) * 0.5));
      placeRandomBlockers(blockers, BLOCKER.ICE2, 2 + Math.floor((i - 19) * 0.4));
    }

    levels.push({ level: i, moves: totalMoves, stars, blockers });
  }

  return levels;
}

const ALL_LEVELS = generateLevels();

// ═══════════════════════════════════════════════════════
// SECTION 8: INPUT HANDLING
// ═══════════════════════════════════════════════════════

let pointerStartX = null, pointerStartY = null;

function getClickedCell(px, py) {
  const c = Math.floor((px - boardX) / cellSize);
  const r = Math.floor((py - boardY) / cellSize);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return { r, c };
  return null;
}

function isSoundToggle(px, py) {
  return px > W - 55 && py < 45;
}

function isBackButton(px, py) {
  return px < 80 && py < 45 && state.screen === SCREEN.PLAYING && !state.animating;
}

function handleBoardClick(px, py) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;
  const cell = getClickedCell(px, py);
  if (!cell || !isPlayable(cell.r, cell.c)) return;

  ensureAudio();

  if (!state.selected) {
    state.selected = cell;
    sfxClick();
    return;
  }

  if (state.selected.r === cell.r && state.selected.c === cell.c) {
    state.selected = null;
    return;
  }

  const dr = Math.abs(state.selected.r - cell.r);
  const dc = Math.abs(state.selected.c - cell.c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(cell.r, cell.c);
  } else {
    state.selected = cell;
    sfxClick();
  }
}

function handleSwipe(startX, startY, endX, endY) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;
  const cell = getClickedCell(startX, startY);
  if (!cell) return;

  const dx = endX - startX;
  const dy = endY - startY;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
    handleBoardClick(startX, startY);
    return;
  }

  if (!isPlayable(cell.r, cell.c)) return;

  let tr, tc;
  if (Math.abs(dx) > Math.abs(dy)) {
    tr = cell.r;
    tc = cell.c + (dx > 0 ? 1 : -1);
  } else {
    tr = cell.r + (dy > 0 ? 1 : -1);
    tc = cell.c;
  }

  if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS && isPlayable(tr, tc)) {
    state.selected = cell;
    ensureAudio();
    trySwap(tr, tc);
  }
}

// Level select button dimensions (shared between draw and click)
function getLevelSelectLayout() {
  const gridCols = 5;
  const maxBtnSize = Math.min((W - 80) / gridCols - 10, 64);
  const btnSize = Math.max(maxBtnSize, 36);
  const gapX = Math.max(6, Math.floor((W - gridCols * btnSize - 40) / (gridCols - 1)));
  const gapY = Math.max(12, Math.floor(btnSize * 0.3));
  const totalW = gridCols * btnSize + (gridCols - 1) * gapX;
  const startX = (W - totalW) / 2;
  const startY = H * 0.2;
  return { gridCols, btnSize, gapX, gapY, startX, startY };
}

function handleLevelSelectClick(px, py) {
  const { gridCols, btnSize, gapX, gapY, startX, startY } = getLevelSelectLayout();

  for (let i = 0; i < 30; i++) {
    const row = Math.floor(i / gridCols);
    const col = i % gridCols;
    const bx = startX + col * (btnSize + gapX);
    const by = startY + row * (btnSize + gapY);

    if (px >= bx && px <= bx + btnSize && py >= by && py <= by + btnSize) {
      const levelNum = i + 1;
      const unlocked = levelNum === 1 || (state.progress[levelNum - 1] && state.progress[levelNum - 1] >= 1);
      if (unlocked) {
        ensureAudio();
        startLevel(levelNum);
        sfxClick();
      }
      return;
    }
  }
}

function handleOverlayClick(px, py) {
  const btnW = 180, btnH = 50;
  const btnX = (W - btnW) / 2;

  if (state.screen === SCREEN.LEVEL_COMPLETE) {
    const btnY1 = H * 0.58;
    if (px >= btnX && px <= btnX + btnW && py >= btnY1 && py <= btnY1 + btnH) {
      ensureAudio();
      sfxClick();
      if (state.level < 30) startLevel(state.level + 1);
      else state.screen = SCREEN.LEVEL_SELECT;
      return;
    }
    const btnY2 = btnY1 + btnH + 14;
    if (px >= btnX && px <= btnX + btnW && py >= btnY2 && py <= btnY2 + btnH) {
      ensureAudio();
      sfxClick();
      state.screen = SCREEN.LEVEL_SELECT;
      return;
    }
  } else if (state.screen === SCREEN.LEVEL_FAILED) {
    const btnY1 = H * 0.55;
    if (px >= btnX && px <= btnX + btnW && py >= btnY1 && py <= btnY1 + btnH) {
      ensureAudio();
      sfxClick();
      startLevel(state.level);
      return;
    }
    const btnY2 = btnY1 + btnH + 14;
    if (px >= btnX && px <= btnX + btnW && py >= btnY2 && py <= btnY2 + btnH) {
      ensureAudio();
      sfxClick();
      state.screen = SCREEN.LEVEL_SELECT;
      return;
    }
  }
}

function onPointerDown(e) {
  e.preventDefault();
  const px = e.clientX, py = e.clientY;

  if (isSoundToggle(px, py)) {
    ensureAudio();
    soundEnabled = !soundEnabled;
    sfxClick();
    return;
  }

  if (isBackButton(px, py)) {
    ensureAudio();
    sfxClick();
    state.screen = SCREEN.LEVEL_SELECT;
    state.animating = false;
    return;
  }

  if (state.screen === SCREEN.LEVEL_SELECT) {
    handleLevelSelectClick(px, py);
    return;
  }

  if (state.screen === SCREEN.LEVEL_COMPLETE || state.screen === SCREEN.LEVEL_FAILED) {
    handleOverlayClick(px, py);
    return;
  }

  pointerStartX = px;
  pointerStartY = py;
}

function onPointerUp(e) {
  e.preventDefault();
  if (pointerStartX === null) return;
  const px = e.clientX, py = e.clientY;

  if (state.screen === SCREEN.PLAYING) {
    handleSwipe(pointerStartX, pointerStartY, px, py);
  }

  pointerStartX = null;
  pointerStartY = null;
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointermove', (e) => e.preventDefault());

function drawLevelSelectBgCandies() {
  const now = performance.now() * 0.001;
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 12; i++) {
    const x = ((i * 137.5 + now * 15) % (W + 100)) - 50;
    const y = ((i * 89.3 + now * (8 + i * 2)) % (H + 100)) - 50;
    const type = i % CANDY_TYPES;
    drawCandyShape(x, y, cellSize * 0.35, type);
    ctx.fillStyle = COLORS[type].main;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLevelSelect() {
  drawLevelSelectBgCandies();

  // Title
  const titleGrad = ctx.createLinearGradient(W / 2 - 120, 0, W / 2 + 120, 0);
  titleGrad.addColorStop(0, '#ff6bca');
  titleGrad.addColorStop(0.5, '#ffb347');
  titleGrad.addColorStop(1, '#ff6bca');
  ctx.fillStyle = titleGrad;
  ctx.font = `bold ${Math.floor(cellSize * 0.7)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Candy Crush', W / 2, H * 0.08);

  ctx.font = `${Math.floor(cellSize * 0.32)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = '#aaa';
  ctx.fillText('Select a Level', W / 2, H * 0.14);

  // Level grid
  const { gridCols, btnSize, gapX, gapY, startX, startY } = getLevelSelectLayout();

  for (let i = 0; i < 30; i++) {
    const row = Math.floor(i / gridCols);
    const col = i % gridCols;
    const bx = startX + col * (btnSize + gapX);
    const by = startY + row * (btnSize + gapY);
    const levelNum = i + 1;
    const starsEarned = state.progress[levelNum] || 0;
    const unlocked = levelNum === 1 || (state.progress[levelNum - 1] && state.progress[levelNum - 1] >= 1);

    // Button
    if (unlocked) {
      const tier = levelNum <= 10 ? 0 : levelNum <= 20 ? 1 : 2;
      const tierGrads = [
        ['#2ed573', '#009432'],
        ['#ffa502', '#cc7700'],
        ['#ff4757', '#c44569'],
      ];
      const btnGrad = ctx.createLinearGradient(bx, by, bx + btnSize, by + btnSize);
      btnGrad.addColorStop(0, tierGrads[tier][0]);
      btnGrad.addColorStop(1, tierGrads[tier][1]);
      ctx.fillStyle = btnGrad;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
    }
    drawRoundedRect(bx, by, btnSize, btnSize, 10);
    ctx.fill();

    if (unlocked) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      drawRoundedRect(bx, by, btnSize, btnSize, 10);
      ctx.stroke();
    }

    // Level number or lock
    ctx.fillStyle = unlocked ? '#fff' : '#555';
    ctx.font = `bold ${Math.floor(btnSize * 0.38)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (unlocked) {
      ctx.fillText(levelNum, bx + btnSize / 2, by + btnSize / 2);
    } else {
      ctx.font = `${Math.floor(btnSize * 0.35)}px sans-serif`;
      ctx.fillText('🔒', bx + btnSize / 2, by + btnSize / 2);
    }

    // Stars below button
    if (starsEarned > 0) {
      ctx.font = `${Math.floor(btnSize * 0.22)}px sans-serif`;
      ctx.textBaseline = 'top';
      let starDisplay = '';
      for (let s = 0; s < 3; s++) {
        starDisplay += s < starsEarned ? '★' : '☆';
      }
      ctx.fillStyle = '#ffa502';
      ctx.fillText(starDisplay, bx + btnSize / 2, by + btnSize + 2);
    }
  }
}

function drawOverlayButton(text, x, y, w, h, primary) {
  if (primary) {
    const btnGrad = ctx.createLinearGradient(x, y, x + w, y + h);
    btnGrad.addColorStop(0, '#ff6bca');
    btnGrad.addColorStop(1, '#ff9a56');
    ctx.fillStyle = btnGrad;
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
  }
  drawRoundedRect(x, y, w, h, h / 2);
  ctx.fill();

  if (!primary) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    drawRoundedRect(x, y, w, h, h / 2);
    ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.floor(h * 0.38)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x + w / 2, y + h / 2);
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const boxW = Math.min(W * 0.82, 360);
  const boxH = 260;
  const boxX = (W - boxW) / 2;
  const boxY = H * 0.22;

  const grad = ctx.createLinearGradient(boxX, boxY, boxX + boxW, boxY + boxH);
  grad.addColorStop(0, '#2d1b69');
  grad.addColorStop(1, '#4a1a6b');
  ctx.fillStyle = grad;
  drawRoundedRect(boxX, boxY, boxW, boxH, 20);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  drawRoundedRect(boxX, boxY, boxW, boxH, 20);
  ctx.stroke();

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#2ed573';
  ctx.font = `bold ${Math.floor(cellSize * 0.55)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText('Level Complete!', W / 2, boxY + 48);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.floor(cellSize * 0.5)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText(state.score.toLocaleString(), W / 2, boxY + 100);

  // Stars
  ctx.font = `${Math.floor(cellSize * 0.65)}px sans-serif`;
  let starStr = '';
  for (let i = 0; i < 3; i++) starStr += i < state.stars ? '★' : '☆';
  ctx.fillStyle = '#ffa502';
  ctx.fillText(starStr, W / 2, boxY + 155);

  // Buttons
  const btnW = 180, btnH = 50;
  const btnX = (W - btnW) / 2;
  const btnY1 = H * 0.58;
  drawOverlayButton(state.level < 30 ? 'Next Level' : 'All Done!', btnX, btnY1, btnW, btnH, true);
  drawOverlayButton('Level Select', btnX, btnY1 + btnH + 14, btnW, btnH, false);
}

function drawLevelFailed() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  const boxW = Math.min(W * 0.82, 360);
  const boxH = 220;
  const boxX = (W - boxW) / 2;
  const boxY = H * 0.25;

  const grad = ctx.createLinearGradient(boxX, boxY, boxX + boxW, boxY + boxH);
  grad.addColorStop(0, '#2d1b69');
  grad.addColorStop(1, '#4a1a6b');
  ctx.fillStyle = grad;
  drawRoundedRect(boxX, boxY, boxW, boxH, 20);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  drawRoundedRect(boxX, boxY, boxW, boxH, 20);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff4757';
  ctx.font = `bold ${Math.floor(cellSize * 0.55)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText('Out of Moves!', W / 2, boxY + 48);

  ctx.fillStyle = '#ccc';
  ctx.font = `${Math.floor(cellSize * 0.33)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText(`Score: ${state.score.toLocaleString()}`, W / 2, boxY + 95);

  const ld = state.levelData;
  ctx.fillStyle = '#888';
  ctx.fillText(`Need ${ld.stars[0].toLocaleString()} to pass`, W / 2, boxY + 130);

  const btnW = 180, btnH = 50;
  const btnX = (W - btnW) / 2;
  const btnY1 = H * 0.55;
  drawOverlayButton('Try Again', btnX, btnY1, btnW, btnH, true);
  drawOverlayButton('Level Select', btnX, btnY1 + btnH + 14, btnW, btnH, false);
}

// ═══════════════════════════════════════════════════════
// SECTION 10: GAME LOOP & INITIALIZATION
// ═══════════════════════════════════════════════════════

function startLevel(levelNum) {
  const ld = ALL_LEVELS[levelNum - 1];
  state.level = levelNum;
  state.levelData = ld;
  state.score = 0;
  state.movesLeft = ld.moves;
  state.totalMoves = ld.moves;
  state.selected = null;
  state.animating = false;
  state.cascade = 0;
  state.hintTimer = 0;
  state.hintMove = null;
  state.particles = [];
  state.floatingTexts = [];
  state.animations = [];
  state.shakeAmount = 0;
  state.shakeTime = 0;
  state.stars = 0;
  state.bonusPhase = false;
  state.screen = SCREEN.PLAYING;

  createBoard(ld);

  let attempts = 0;
  while ((findAllMatchedCells().length > 0 || !hasValidMoves()) && attempts < 150) {
    createBoard(ld);
    attempts++;
  }
}

let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Update
  updateParticles(dt);

  // Hint timer
  if (state.screen === SCREEN.PLAYING && !state.animating && !state.selected && !state.bonusPhase) {
    state.hintTimer += dt;
    if (state.hintTimer > 5 && !state.hintMove) {
      state.hintMove = hasValidMoves();
    }
  }

  // Draw
  drawBackground();

  if (state.screen === SCREEN.LEVEL_SELECT) {
    drawLevelSelect();
  } else {
    drawBoard();
    drawHUD();
    drawParticles();
    drawFloatingTexts();

    if (state.screen === SCREEN.LEVEL_COMPLETE) {
      drawLevelComplete();
    } else if (state.screen === SCREEN.LEVEL_FAILED) {
      drawLevelFailed();
    }
  }

  // Sound toggle (always visible)
  ctx.font = `${Math.floor(cellSize * 0.38)}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.fillText(soundEnabled ? '🔊' : '🔇', W - 12, 10);

  requestAnimationFrame(gameLoop);
}

// Start
loadProgress();
resize();
requestAnimationFrame(gameLoop);

</script>
