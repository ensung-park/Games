// SECTION 10: GAME LOOP & INITIALIZATION
// ═══════════════════════════════════════════════════════

function startLevel(n) {
  const ld = ALL_LEVELS[n - 1];
  Object.assign(state, {
    level: n, levelData: ld, score: 0, movesLeft: ld.moves, totalMoves: ld.moves,
    selected: null, animating: false, cascade: 0, hintTimer: 0, hintMove: null,
    particles: [], floatingTexts: [], tweens: [], shakeAmount: 0, shakeTime: 0,
    stars: 0, bonusPhase: false, dailyChallenge: false,
    goalType: ld.goal || GOAL.SCORE,
    goalProgress: {},
    hammerAvailable: true, hammerActive: false,
    jellyBoard: null,
    goalPreviewTimer: 3.0,
    screen: SCREEN.GOAL_PREVIEW,
    levelGen: state.levelGen + 1,
  });

  createBoard(ld);
  let att = 0; while ((findAllMatchedCells().length > 0 || !hasValidMoves()) && att < 150) { createBoard(ld); att++; }

  // Start background music
  ensureAudio(); startBgMusic();

  // Initialize goal-specific state
  if (ld.goal === GOAL.CLEAR_JELLY) {
    state.jellyBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    let placed = 0, attempts = 0;
    const target = ld.goalData.jellyCount || 15;
    while (placed < target && attempts < 500) {
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (state.jellyBoard[r][c] === 0 && isPlayable(r, c)) {
        state.jellyBoard[r][c] = (placed < target / 3) ? 2 : 1;
        placed++;
      }
      attempts++;
    }
    state.goalProgress = { jellyLeft: placed };
  } else if (ld.goal === GOAL.COLLECT) {
    state.goalProgress = { collected: 0, target: ld.goalData.collectTarget, collectType: ld.goalData.collectType };
  } else if (ld.goal === GOAL.CLEAR_CHOCOLATE) {
    // Count chocolate blocks on the board
    let chocCount = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (state.board[r][c].blocker === BLOCKER.CHOCOLATE) chocCount++;
    }
    // If level has no chocolate, add some
    if (chocCount === 0) {
      const toAdd = 3 + Math.floor(state.level * 0.3);
      // Deep copy blockers to avoid mutating the level template
      const blCopy = ld.blockers.map(row => [...row]);
      placeRandomBlockers(blCopy, BLOCKER.CHOCOLATE, toAdd);
      // Use copy for board creation (don't assign back to ld)
      const tmpLd = { ...ld, blockers: blCopy };
      createBoard(tmpLd);
      let att2 = 0; while ((findAllMatchedCells().length > 0 || !hasValidMoves()) && att2 < 150) { createBoard(tmpLd); att2++; }
      chocCount = toAdd;
    }
    state.goalProgress = { chocolateLeft: chocCount };
  }
}

function startDailyChallenge() {
  const ld = generateDailyLevel();
  Object.assign(state, {
    level: 0, levelData: ld, score: 0, movesLeft: ld.moves, totalMoves: ld.moves,
    selected: null, animating: false, cascade: 0, hintTimer: 0, hintMove: null,
    particles: [], floatingTexts: [], tweens: [], shakeAmount: 0, shakeTime: 0,
    stars: 0, bonusPhase: false, dailyChallenge: true,
    goalType: ld.goal || GOAL.SCORE,
    goalProgress: {},
    hammerAvailable: true, hammerActive: false,
    jellyBoard: null,
    goalPreviewTimer: 3.0,
    screen: SCREEN.GOAL_PREVIEW,
    levelGen: state.levelGen + 1,
  });
  // Use date seed for board randomness
  const dailyRng = seededRng(getDailySeed() + 1);
  const origRandom = Math.random;
  Math.random = dailyRng;
  createBoard(ld);
  let att = 0; while ((findAllMatchedCells().length > 0 || !hasValidMoves()) && att < 150) { createBoard(ld); att++; }
  Math.random = origRandom;
  ensureAudio(); startBgMusic();
  if (ld.goal === GOAL.CLEAR_JELLY) {
    state.jellyBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    let placed = 0, attempts = 0; const target = ld.goalData.jellyCount || 15;
    while (placed < target && attempts < 500) { const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS); if (state.jellyBoard[r][c] === 0 && isPlayable(r, c)) { state.jellyBoard[r][c] = (placed < target / 3) ? 2 : 1; placed++; } attempts++; }
    state.goalProgress = { jellyLeft: placed };
  } else if (ld.goal === GOAL.COLLECT) {
    state.goalProgress = { collected: 0, target: ld.goalData.collectTarget, collectType: ld.goalData.collectType };
  } else if (ld.goal === GOAL.CLEAR_CHOCOLATE) {
    let chocCount = 0; for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].blocker === BLOCKER.CHOCOLATE) chocCount++;
    if (chocCount === 0) { const toAdd = 5; const blCopy = ld.blockers.map(row => [...row]); placeRandomBlockers(blCopy, BLOCKER.CHOCOLATE, toAdd); const tmpLd = { ...ld, blockers: blCopy }; createBoard(tmpLd); let att2 = 0; while ((findAllMatchedCells().length > 0 || !hasValidMoves()) && att2 < 150) { createBoard(tmpLd); att2++; } chocCount = toAdd; }
    state.goalProgress = { chocolateLeft: chocCount };
  }
}

function getGoalText(ld) {
  if (!ld) return '';
  if (ld.goal === GOAL.CLEAR_JELLY) return 'Clear all the jelly!';
  if (ld.goal === GOAL.COLLECT) return `Collect ${ld.goalData.collectTarget} ${SHAPES[ld.goalData.collectType]} candies!`;
  if (ld.goal === GOAL.CLEAR_CHOCOLATE) return 'Clear all the chocolate!';
  return `Score ${ld.stars[0].toLocaleString()} points!`;
}

let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05); lastTime = time;
  updateTweens(dt); updateParticles(dt);

  // Goal preview countdown
  if (state.screen === SCREEN.GOAL_PREVIEW) {
    state.goalPreviewTimer -= dt;
    if (state.goalPreviewTimer <= 0) state.screen = SCREEN.PLAYING;
  }

  if (state.screen === SCREEN.PLAYING && !state.animating && !state.selected && !state.bonusPhase) {
    state.hintTimer += dt;
    if (state.hintTimer > 5 && !state.hintMove) state.hintMove = hasValidMoves();
  }

  // Update transition
  if (state.transition) {
    state.transition.progress += dt / state.transition.duration;
    if (state.transition.progress >= 1) { state.transition = null; }
  }

  const transAlpha = state.transition ? state.transition.progress : 1;

  drawBackground();

  // During transition, fade out old screen then fade in new
  if (state.transition && transAlpha < 0.5) {
    ctx.globalAlpha = 1 - transAlpha * 2;
  } else if (state.transition) {
    ctx.globalAlpha = (transAlpha - 0.5) * 2;
  }

  if (state.screen === SCREEN.TITLE) drawTitleScreen();
  else if (state.screen === SCREEN.LEVEL_SELECT) drawLevelSelect();
  else if (state.screen === SCREEN.LEADERBOARD) drawLeaderboard();
  else if (state.screen === SCREEN.GOAL_PREVIEW) drawGoalPreview();
  else {
    // Draw jelly UNDER the board
    if (state.jellyBoard) drawJelly();
    drawBoard(); drawHUD(); drawParticles(); drawFloatingTexts();
    // Draw hammer button
    drawHammerButton();
    // Draw goal progress
    drawGoalProgress();
    if (state.screen === SCREEN.LEVEL_COMPLETE) drawLevelComplete();
    else if (state.screen === SCREEN.LEVEL_FAILED) drawLevelFailed();
  }
  ctx.globalAlpha = 1;

  // Screen flash effect
  if (state.screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${state.screenFlash})`;
    ctx.fillRect(0, 0, W, H);
    state.screenFlash -= dt * 2;
    if (state.screenFlash < 0) state.screenFlash = 0;
  }

  // Edge flash for combos
  if (state.edgeFlash && state.edgeFlash.life > 0) {
    const ef = state.edgeFlash, alpha = ef.life * 0.6;
    const corners = [[0, 0], [W, 0], [0, H], [W, H]];
    for (const [cx, cy] of corners) {
      const eg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.4);
      eg.addColorStop(0, ef.color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', ''));
      // Convert hex to rgba
      ctx.fillStyle = ef.color; ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath(); ctx.arc(cx, cy, Math.max(W, H) * 0.25, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ef.life -= dt;
  }

  // Moves counter pulse when low
  if (state.screen === SCREEN.PLAYING && state.movesLeft <= 5 && state.movesLeft > 0 && !state.animating) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.01);
    ctx.fillStyle = `rgba(255,71,87,${pulse * 0.15})`;
    ctx.fillRect(0, 0, W, boardY);
    // Redraw moves text with pulse/scale
    const sc = 1 + 0.1 * Math.sin(performance.now() * 0.008);
    ctx.save(); ctx.translate(W / 2, boardY * 0.7); ctx.scale(sc, sc);
    ctx.font = `bold ${Math.floor(cellSize * 0.32)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,71,87,${0.7 + pulse * 0.3})`;
    ctx.fillText(`${state.movesLeft} moves left`, 0, 0);
    ctx.restore();
  }

  // Sound toggle
  ctx.font = `${Math.floor(cellSize * 0.38)}px sans-serif`; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff'; ctx.fillText(soundEnabled ? '🔊' : '🔇', W - 12, 10);
  // Color-blind toggle (gameplay)
  if (state.screen === SCREEN.PLAYING || state.screen === SCREEN.TITLE || state.screen === SCREEN.LEVEL_SELECT) {
    const cbW2 = 36, cbH2 = 22, cbX2 = W - cbW2 - 12, cbY2 = 42;
    ctx.fillStyle = state.colorBlindMode ? 'rgba(46,213,115,0.3)' : 'rgba(255,255,255,0.06)';
    drawRoundedRect(cbX2, cbY2, cbW2, cbH2, cbH2 / 2); ctx.fill();
    ctx.fillStyle = state.colorBlindMode ? '#2ed573' : '#666'; ctx.font = `bold ${Math.floor(cbH2 * 0.5)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('CB', cbX2 + cbW2 / 2, cbY2 + cbH2 / 2);
    state._cbBtnGame = { x: cbX2, y: cbY2, w: cbW2, h: cbH2 };
  }
  requestAnimationFrame(gameLoop);
}

loadProgressLocal(null); resize(); requestAnimationFrame(gameLoop);

// Handle redirect result (mobile Google Sign-In)
getRedirectResult(auth).then(result => {
  if (result && result.user) {
    // Auth state change will handle the rest via onAuthStateChanged
    console.log('Redirect sign-in complete:', result.user.displayName);
  }
}).catch(e => console.warn('Redirect result error:', e.message));

// ── Browser back-button handling ──────────────────────────────────────────
// Push an initial state so the browser back button navigates within the game
// instead of closing/exiting the page.
history.pushState({ screen: 'game' }, '');
window.addEventListener('popstate', () => {
  // Always re-push so there's always a state to go back to
  history.pushState({ screen: 'game' }, '');
  // Navigate within game screens
  if (state.screen === SCREEN.PLAYING || state.screen === SCREEN.GOAL_PREVIEW) {
    sfxClick();
    state.screen = SCREEN.LEVEL_SELECT;
    state.animating = false; state.tweens = []; state.particles = []; state.floatingTexts = [];
    state.dailyChallenge = false; stopBgMusic();
  } else if (state.screen === SCREEN.LEADERBOARD || state.screen === SCREEN.LEVEL_FAILED || state.screen === SCREEN.LEVEL_COMPLETE) {
    sfxClick();
    state.screen = SCREEN.LEVEL_SELECT;
  } else if (state.screen === SCREEN.LEVEL_SELECT) {
    sfxClick();
    state.screen = SCREEN.TITLE;
  }
  // On TITLE screen: do nothing (stay in app)
});

// Register auth listener AFTER all game state is initialized
onAuthStateChanged(auth, async (user) => {
  const prevUser = firebase.user;
  firebase.user = user;
  firebase.ready = true;

  if (user) {
    // Signed in — load this user's own progress (separate from guest)
    loadProgressLocal(user.uid);
    // Merge with cloud
    const cloud = await firebase.loadCloudProgress();
    if (cloud) {
      let changed = false;
      for (const key in cloud) {
        const best = Math.max(cloud[key] || 0, state.progress[key] || 0);
        if (best !== (state.progress[key] || 0)) changed = true;
        state.progress[key] = best;
      }
      for (const key in state.progress) {
        if (!cloud[key] && state.progress[key] > 0) changed = true;
      }
      saveProgressLocal();
      if (changed) {
        const { totalStars, highestLevel } = getProgressStats();
        await firebase.saveCloudProgress(state.progress, totalStars, highestLevel);
      }
    }
    if (state.screen === SCREEN.TITLE) state.screen = SCREEN.LEVEL_SELECT;
  } else if (prevUser) {
    // Signed out — switch back to guest progress (separate storage)
    loadProgressLocal(null);
    state.screen = SCREEN.TITLE;
  }
});

// ── Animating watchdog ────────────────────────────────────────────────────
// If state.animating gets stuck true for >3s while on PLAYING screen,
// force-reset it so the game doesn't stay frozen.
let _animWatchdogStart = 0;
setInterval(() => {
  if (state.screen === SCREEN.PLAYING && state.animating) {
    const now = Date.now();
    if (!_animWatchdogStart) { _animWatchdogStart = now; return; }
    if (now - _animWatchdogStart > 3000) {
      console.warn('Watchdog: force-resetting stuck state.animating');
      state.animating = false;
      state.tweens = [];
      _animWatchdogStart = 0;
    }
  } else {
    _animWatchdogStart = 0;
  }
}, 500);

</script>
</body>
