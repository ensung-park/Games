const firebase = {
  user: null,
  ready: false,

  async signIn() {
    try {
      // On mobile, popups are often blocked — use redirect instead
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      if (isMobile) {
        await signInWithRedirect(auth, googleProvider);
      } else {
        await signInWithPopup(auth, googleProvider);
      }
    } catch (e) {
      console.warn('Sign-in failed:', e.message);
    }
  },

  async signOutUser() {
    try {
      await signOut(auth);
      this.user = null;
    } catch (e) {
      console.warn('Sign-out failed:', e.message);
    }
  },

  async loadCloudProgress() {
    if (!this.user) return null;
    try {
      const snap = await getDoc(doc(db, 'users', this.user.uid));
      if (snap.exists()) return snap.data().progress || {};
      return {};
    } catch (e) {
      console.warn('Load failed:', e.message);
      return null;
    }
  },

  async saveCloudProgress(progress, totalStars, highestLevel) {
    if (!this.user) return;
    try {
      const userRef = doc(db, 'users', this.user.uid);
      const data = {
        displayName: this.user.displayName || 'Player',
        photoURL: this.user.photoURL || '',
        progress: progress,
        totalStars: totalStars,
        highestLevel: highestLevel,
        lastPlayed: new Date().toISOString(),
      };
      await setDoc(userRef, data, { merge: true });
      // Update leaderboard
      const lbRef = doc(db, 'leaderboard', this.user.uid);
      await setDoc(lbRef, {
        uid: this.user.uid,
        displayName: this.user.displayName || 'Player',
        photoURL: this.user.photoURL || '',
        totalStars: totalStars,
        highestLevel: highestLevel,
        updatedAt: new Date().toISOString(),
      });
    } catch (e) {
      console.warn('Save failed:', e.message);
    }
  },

  async loadLeaderboard() {
    try {
      const q = query(collection(db, 'leaderboard'), orderBy('totalStars', 'desc'), limit(20));
      const snap = await getDocs(q);
      return snap.docs.map(d => d.data());
    } catch (e) {
      console.warn('Leaderboard load failed:', e.message);
      return [];
    }
  }
};

let W, H, cellSize, boardX, boardY, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // On tall portrait phones, use up to 75% of screen height for the board
  const isPortrait = H > W * 1.3;
  const maxBoardH = isPortrait ? H * 0.72 : H * 0.60;
  cellSize = Math.floor(Math.min(W * 0.92, maxBoardH, 420) / COLS);
  boardX = Math.floor((W - cellSize * COLS) / 2);
  boardY = Math.floor(H * (isPortrait ? 0.16 : 0.22));
}

function transitionTo(screen) {
  state.transition = { from: state.screen, to: screen, progress: 0, duration: 0.25 };
  state.screen = screen;

function makeCell(type, special, blocker) {
  return { type, special: special || SPECIAL.NONE, blocker: blocker || BLOCKER.NONE };
}

function progressKey(uid) {
  return uid ? 'sweetMatchProgress_' + uid : 'sweetMatchProgress_guest';
}
function boosterKey(uid) {
  return uid ? 'sweetMatchBoosters_' + uid : 'sweetMatchBoosters_guest';
}

function loadProgressLocal(uid) {
  try {
    const saved = localStorage.getItem(progressKey(uid));
    state.progress = saved ? JSON.parse(saved) : {};
    const bc = localStorage.getItem(boosterKey(uid));
    state.boosterCharges = bc !== null ? Math.min(parseInt(bc) || 0, 3) : 0;
  } catch (e) {}
}

function saveProgressLocal() {
  try {
    const uid = firebase.user ? firebase.user.uid : null;
    localStorage.setItem(progressKey(uid), JSON.stringify(state.progress));
    localStorage.setItem(boosterKey(uid), state.boosterCharges);
  } catch (e) {}
}

function getProgressStats() {
  let totalStars = 0, highestLevel = 0;
  for (const key in state.progress) {
    totalStars += state.progress[key] || 0;
    const lvl = parseInt(key);
    if (lvl > highestLevel && state.progress[key] > 0) highestLevel = lvl;
  }
  return { totalStars, highestLevel };
}

async function saveProgress() {
  saveProgressLocal();
  if (firebase.user) {
    const { totalStars, highestLevel } = getProgressStats();
    await firebase.saveCloudProgress(state.progress, totalStars, highestLevel);
  }
}

// SECTION 3: AUDIO ENGINE

let audioCtx = null;
let soundEnabled = (() => { try { const v = localStorage.getItem('sweetMatchSound'); return v === null ? true : v === 'true'; } catch(e) { return true; } })();

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, delay) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const t = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol || 0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  } catch (e) {}
}

function playNoise(dur, vol, delay) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const t = audioCtx.currentTime + (delay || 0);
    const sz = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, sz, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol || 0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(t);
    src.stop(t + dur);
  } catch (e) {}
}

// ── Background Music (procedural loop) ──
let bgMusicPlaying = false;
let bgMusicNodes = [];
let bgMusicInterval = null;

function startBgMusic() {
  if (!soundEnabled || !audioCtx || bgMusicPlaying) return;
  bgMusicPlaying = true;

  // Create a soft ambient pad
  const padGain = audioCtx.createGain();
  padGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
  padGain.connect(audioCtx.destination);

  // Two detuned oscillators for warm pad
  for (const detune of [-5, 5]) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
    osc.detune.setValueAtTime(detune, audioCtx.currentTime);
    osc.connect(padGain);
    osc.start();
    bgMusicNodes.push(osc);
  }
  // Third oscillator for 5th harmony
  const osc3 = audioCtx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(330, audioCtx.currentTime); // E4
  const g3 = audioCtx.createGain();
  g3.gain.setValueAtTime(0.015, audioCtx.currentTime);
  osc3.connect(g3); g3.connect(audioCtx.destination);
  osc3.start();
  bgMusicNodes.push(osc3, g3);
  bgMusicNodes.push(padGain);

  // Melodic sequence that loops
  const melody = [523, 587, 659, 587, 523, 494, 440, 494]; // C D E D C B A B
  const melodyDur = 0.4;
  let melodyIdx = 0;

  bgMusicInterval = setInterval(() => {
    if (!soundEnabled || !audioCtx || !bgMusicPlaying) return;
    const t = audioCtx.currentTime;
    const freq = melody[melodyIdx % melody.length];
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.04, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + melodyDur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + melodyDur);

    // Soft harmony note
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq * 0.5, t); // octave below
    g2.gain.setValueAtTime(0.02, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + melodyDur * 1.2);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(t); o2.stop(t + melodyDur * 1.2);

    melodyIdx++;
  }, 500);
}

function stopBgMusic() {
  bgMusicPlaying = false;
  if (bgMusicInterval) { clearInterval(bgMusicInterval); bgMusicInterval = null; }
  for (const node of bgMusicNodes) {
    try { if (node.stop) node.stop(); else if (node.disconnect) node.disconnect(); } catch (e) {}
  }
  bgMusicNodes = [];
}

function haptic(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {} }

// Combo celebration sound: escalating chimes
function sfxCombo(level) {
  const base = 600 + level * 150;
  for (let i = 0; i < Math.min(level, 5); i++) {
    playTone(base + i * 200, 0.12, 'sine', 0.06, i * 0.04);

// ═══════════════════════════════════════════════════════
// SECTION 4: TWEEN & PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════

const MAX_PARTICLES = 400;

function addParticle(x, y, color, count) {
  const n = count || 8;
  while (state.particles.length + n > MAX_PARTICLES && state.particles.length > 0) state.particles.shift();
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 50 + Math.random() * 150;
    const shapes = ['star', 'circle', 'diamond'];
    state.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.4 + Math.random() * 0.4, maxLife: 0.4 + Math.random() * 0.4, size: 2 + Math.random() * 4, color, shape: shapes[Math.floor(Math.random() * 3)], rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 8 });
  }
}

function addConfetti(x, y, count) {
  const n = count || 30;
  while (state.particles.length + n > MAX_PARTICLES && state.particles.length > 0) state.particles.shift();
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 100 + Math.random() * 250;
    state.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 150, life: 1 + Math.random(), maxLife: 1 + Math.random(), size: 3 + Math.random() * 5, color: COLORS[Math.floor(Math.random() * COLORS.length)].main });
  }
}

function addFloatingText(x, y, text, color, size) {
  state.floatingTexts.push({ x, y, text, color: color || '#fff', life: 1.2, maxLife: 1.2, vy: -70, size: size || Math.floor(cellSize * 0.4) });
}

// Tween system for smooth animations
function tween(obj, props, duration, easing) {
  return new Promise(resolve => {
    const start = {};
    for (const k in props) start[k] = obj[k] !== undefined ? obj[k] : 0;
    state.tweens.push({ obj, start, end: props, duration, elapsed: 0, easing: easing || 'easeOut', onDone: resolve });
  });
}

function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeIn(t) { return t * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) * (-2 * t + 2) / 2; }
function easeBounce(t) { if (t < 0.5) return 4 * t * t; const b = (t - 0.8) * 5; return 1 - b * b * 0.15; }

function updateTweens(dt) {
  for (let i = state.tweens.length - 1; i >= 0; i--) {
    const tw = state.tweens[i];
    tw.elapsed += dt;
    let t = Math.min(tw.elapsed / tw.duration, 1);
    const ef = tw.easing === 'easeIn' ? easeIn : tw.easing === 'easeInOut' ? easeInOut : tw.easing === 'bounce' ? easeBounce : easeOut;
    const et = ef(t);
    for (const k in tw.end) tw.obj[k] = tw.start[k] + (tw.end[k] - tw.start[k]) * et;
    if (t >= 1) {
      if (tw.end.removeScale !== undefined && tw.end.removeScale === 0) tw.obj.alpha = 0;
      state.tweens.splice(i, 1); if (tw.onDone) tw.onDone();
    }
  }
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 250 * dt; p.life -= dt; if (p.rotation !== undefined) p.rotation += (p.rotSpeed || 0) * dt;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
  for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
    const ft = state.floatingTexts[i];
    ft.y += ft.vy * dt; ft.vy *= 0.97; ft.life -= dt;
    if (ft.life <= 0) state.floatingTexts.splice(i, 1);
  }
  if (state.shakeAmount > 0) { state.shakeTime += dt; state.shakeAmount *= Math.pow(0.05, dt); if (state.shakeAmount < 0.3) state.shakeAmount = 0; }
}

function cellToScreen(r, c) {
  return { x: boardX + c * cellSize + cellSize / 2, y: boardY + r * cellSize + cellSize / 2 };
}

function drawRoundedRect(x, y, w, h, rad) {
  ctx.beginPath();
  ctx.moveTo(x + rad, y); ctx.lineTo(x + w - rad, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rad); ctx.lineTo(x + w, y + h - rad);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h); ctx.lineTo(x + rad, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rad); ctx.lineTo(x, y + rad);
  ctx.quadraticCurveTo(x, y, x + rad, y); ctx.closePath();
}

function drawCandyShape(x, y, r, type) {
  ctx.beginPath();
  switch (SHAPES[type]) {
    case 'circle': ctx.arc(x, y, r, 0, Math.PI * 2); break;
    case 'diamond': ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.85, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r * 0.85, y); ctx.closePath(); break;
    case 'square': drawRoundedRect(x - r * 0.75, y - r * 0.75, r * 1.5, r * 1.5, r * 0.22); break;
    case 'triangle': ctx.moveTo(x, y - r * 0.95); ctx.lineTo(x + r * 0.9, y + r * 0.65); ctx.lineTo(x - r * 0.9, y + r * 0.65); ctx.closePath(); break;
    case 'pentagon': for (let i = 0; i < 5; i++) { const a = -Math.PI / 2 + i * Math.PI * 2 / 5; if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r); else ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r); } ctx.closePath(); break;
    case 'heart': ctx.moveTo(x, y + r * 0.65); ctx.bezierCurveTo(x - r * 1.2, y - r * 0.1, x - r * 0.6, y - r * 0.95, x, y - r * 0.35); ctx.bezierCurveTo(x + r * 0.6, y - r * 0.95, x + r * 1.2, y - r * 0.1, x, y + r * 0.65); break;
  }
}

function drawCandy(x, y, size, type, special, alpha) {
  if (type < 0 || type >= CANDY_TYPES) return;
  const col = COLORS[type], r = size * 0.40;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.arc(x + 1.5, y + 2, r, 0, Math.PI * 2); ctx.fill();
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.35, 0, x, y, r * 1.1);
  grad.addColorStop(0, col.light); grad.addColorStop(0.45, col.main); grad.addColorStop(1, col.dark);
  ctx.fillStyle = grad; drawCandyShape(x, y, r, type); ctx.fill();
  // Dark outline
  ctx.strokeStyle = col.dark; ctx.lineWidth = 1.5; drawCandyShape(x, y, r, type); ctx.stroke();
  // Glossy highlight ellipse
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.ellipse(x - r * 0.2, y - r * 0.25, r * 0.45, r * 0.28, -0.3, 0, Math.PI * 2); ctx.fill();
  // Main highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(x - r * 0.15, y - r * 0.28, r * 0.5, r * 0.3, -0.3, 0, Math.PI * 2); ctx.fill();
  // Specular dot
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(x - r * 0.28, y - r * 0.3, r * 0.08, 0, Math.PI * 2); ctx.fill();
  const now = performance.now();
  if (special === SPECIAL.STRIPED_H) { ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.5; const shimmer = Math.sin(now * 0.005) * r * 0.06; for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(x - r * 0.65, y + i * r * 0.22 + shimmer); ctx.lineTo(x + r * 0.65, y + i * r * 0.22 + shimmer); ctx.stroke(); } }
  else if (special === SPECIAL.STRIPED_V) { ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.5; const shimmer = Math.sin(now * 0.005) * r * 0.06; for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(x + i * r * 0.22 + shimmer, y - r * 0.65); ctx.lineTo(x + i * r * 0.22 + shimmer, y + r * 0.65); ctx.stroke(); } }
  else if (special === SPECIAL.WRAPPED) { const pulseR = 0.55 + 0.1 * Math.sin(now * 0.004); ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y, r * pulseR, 0, Math.PI * 2); ctx.stroke(); ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(x, y, r * (pulseR - 0.25), 0, Math.PI * 2); ctx.stroke(); }
  // Color-blind mode letter
  if (state.colorBlindMode) {
    const cbLetters = ['R', 'O', 'G', 'B', 'P', 'H'];
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.floor(r * 0.7)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(cbLetters[type] || '?', x, y);
  }
  // Orbiting sparkle dots for specials
  if (special !== SPECIAL.NONE && special !== SPECIAL.COLOR_BOMB) {
    const sparkCount = 3, orbitR = r * 0.75;
    for (let i = 0; i < sparkCount; i++) { const a = now * 0.003 + i * (Math.PI * 2 / sparkCount); ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(x + Math.cos(a) * orbitR, y + Math.sin(a) * orbitR, 1.5, 0, Math.PI * 2); ctx.fill(); }
  }
  ctx.restore();
}

function drawColorBomb(x, y, size, alpha) {
  const r = size * 0.40;
  ctx.save(); if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.arc(x + 1.5, y + 2, r, 0, Math.PI * 2); ctx.fill();
  const now = performance.now();
  for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2 + now * 0.002; ctx.fillStyle = COLORS[i].main; ctx.beginPath(); ctx.moveTo(x, y); ctx.arc(x, y, r, a, a + Math.PI / 3); ctx.closePath(); ctx.fill(); }
  const cg = ctx.createRadialGradient(x, y, 0, x, y, r * 0.35); cg.addColorStop(0, '#fff'); cg.addColorStop(1, 'rgba(255,255,255,0.3)');
  ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(x, y, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBlocker(x, y, size, blocker) {
  const r = size * 0.44;
  if (blocker === BLOCKER.ICE1 || blocker === BLOCKER.ICE2) {
    ctx.fillStyle = `rgba(180,230,255,${blocker === BLOCKER.ICE2 ? 0.25 : 0.12})`; drawRoundedRect(x - r, y - r, r * 2, r * 2, 6); ctx.fill();
    ctx.strokeStyle = blocker === BLOCKER.ICE2 ? 'rgba(150,220,255,0.7)' : 'rgba(150,220,255,0.4)'; ctx.lineWidth = blocker === BLOCKER.ICE2 ? 2.5 : 1.5;
    drawRoundedRect(x - r, y - r, r * 2, r * 2, 6); ctx.stroke();
    if (blocker === BLOCKER.ICE1) { ctx.strokeStyle = 'rgba(200,240,255,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x - r * 0.3, y - r * 0.5); ctx.lineTo(x + r * 0.1, y); ctx.lineTo(x + r * 0.4, y + r * 0.3); ctx.stroke(); }
  } else if (blocker === BLOCKER.CHOCOLATE) {
    const cg = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r * 1.2); cg.addColorStop(0, '#7b4a2b'); cg.addColorStop(1, '#3e210e');
    ctx.fillStyle = cg; drawRoundedRect(x - r, y - r, r * 2, r * 2, 6); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.ellipse(x - r * 0.2, y - r * 0.3, r * 0.5, r * 0.25, -0.3, 0, Math.PI * 2); ctx.fill();
  } else if (blocker === BLOCKER.STONE) {
    const sg = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r * 1.3); sg.addColorStop(0, '#888'); sg.addColorStop(1, '#444');
    ctx.fillStyle = sg; drawRoundedRect(x - r, y - r, r * 2, r * 2, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x - r * 0.5, y - r * 0.3); ctx.lineTo(x + r * 0.15, y + r * 0.05); ctx.lineTo(x + r * 0.5, y + r * 0.45); ctx.stroke();
  }
}

function drawBoard() {
  if (state.screen !== SCREEN.PLAYING && state.screen !== SCREEN.LEVEL_COMPLETE && state.screen !== SCREEN.LEVEL_FAILED) return;
  const shk = state.shakeAmount;
  const sx = shk ? Math.sin(state.shakeTime * 40) * shk : 0;
  const sy = shk ? Math.cos(state.shakeTime * 35) * shk * 0.7 : 0;

  // Multi-layer shadow
  const bRx = boardX - 10 + sx, bRy = boardY - 10 + sy, bRw = cellSize * COLS + 20, bRh = cellSize * ROWS + 20;
  for (const blur of [40, 20, 8]) { ctx.save(); ctx.shadowColor = 'rgba(180,100,255,0.3)'; ctx.shadowBlur = blur; ctx.fillStyle = 'rgba(0,0,0,0.01)'; drawRoundedRect(bRx, bRy, bRw, bRh, 16); ctx.fill(); ctx.restore(); }
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; drawRoundedRect(bRx, bRy, bRw, bRh, 16); ctx.fill();
  // Glowing border
  ctx.save(); const borderGrad = ctx.createLinearGradient(bRx, bRy, bRx + bRw, bRy + bRh); borderGrad.addColorStop(0, '#ff6bca'); borderGrad.addColorStop(1, '#a55eea');
  ctx.strokeStyle = borderGrad; ctx.lineWidth = 2; ctx.shadowColor = '#a55eea'; ctx.shadowBlur = 12;
  drawRoundedRect(bRx, bRy, bRw, bRh, 16); ctx.stroke(); ctx.restore();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const pos = cellToScreen(r, c), cx = pos.x + sx, cy = pos.y + sy;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.015)';
      drawRoundedRect(cx - cellSize / 2 + 1, cy - cellSize / 2 + 1, cellSize - 2, cellSize - 2, 5); ctx.fill();

      const cell = state.board[r] && state.board[r][c];
      if (!cell) continue;
      if (cell.blocker === BLOCKER.STONE) { drawBlocker(cx, cy, cellSize, BLOCKER.STONE); continue; }
      if (cell.blocker === BLOCKER.CHOCOLATE) { drawBlocker(cx, cy, cellSize, BLOCKER.CHOCOLATE); continue; }

      if (cell.type >= 0) {
        const dx = cell.drawX !== undefined ? cell.drawX + sx : cx;
        const dy = cell.drawY !== undefined ? cell.drawY + sy : cy;
        const rsc = cell.removeScale !== undefined ? cell.removeScale : 1;
        const sc = (cell.scale !== undefined ? cell.scale : 1) * rsc;
        const al = cell.alpha !== undefined ? cell.alpha : 1;
        if (al <= 0.01) continue;
        // Glow for selected candy
        const isSel = state.selected && state.selected.r === r && state.selected.c === c && state.screen === SCREEN.PLAYING;
        if (isSel) { const col = COLORS[cell.type % CANDY_TYPES]; ctx.shadowColor = col.light; ctx.shadowBlur = 18; }
        // Glow for hinted candies
        const isHint = state.hintMove && !state.selected && !state.animating && state.screen === SCREEN.PLAYING &&
          ((state.hintMove.r === r && state.hintMove.c === c) || (state.hintMove.r2 === r && state.hintMove.c2 === c));
        if (isHint) { const col = COLORS[cell.type % CANDY_TYPES]; ctx.shadowColor = col.light; ctx.shadowBlur = 8 + 12 * (0.5 + 0.5 * Math.sin(performance.now() * 0.006)); }
        if (cell.special === SPECIAL.COLOR_BOMB) drawColorBomb(dx, dy, cellSize * sc, al);
        else drawCandy(dx, dy, cellSize * sc, cell.type, cell.special, al);
        if (isSel || isHint) ctx.shadowBlur = 0;
      }
      if (cell.blocker === BLOCKER.ICE1 || cell.blocker === BLOCKER.ICE2) drawBlocker(cx, cy, cellSize, cell.blocker);
    }
  }

  // Selection highlight
  if (state.selected && state.screen === SCREEN.PLAYING) {
    const p = cellToScreen(state.selected.r, state.selected.c);
    const pulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.008);
    ctx.strokeStyle = `rgba(255,255,255,${pulse})`; ctx.lineWidth = 2.5; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
    drawRoundedRect(p.x - cellSize / 2 + 3 + sx, p.y - cellSize / 2 + 3 + sy, cellSize - 6, cellSize - 6, 7); ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Hint (bounce/pulse animation)
  if (state.hintMove && !state.selected && !state.animating && state.screen === SCREEN.PLAYING) {
    const t = performance.now() * 0.005;
    const pulse = 0.5 + 0.5 * Math.sin(t);
    const scalePulse = 1 + 0.08 * Math.sin(t * 1.2);
    ctx.strokeStyle = `rgba(255,255,100,${0.3 + pulse * 0.5})`; ctx.lineWidth = 2.5;
    for (const key of ['', '2']) {
      const h = cellToScreen(state.hintMove[key ? 'r2' : 'r'], state.hintMove[key ? 'c2' : 'c']);
      const hx = h.x + sx, hy = h.y + sy;
      const sz = (cellSize - 6) * scalePulse;
      drawRoundedRect(hx - sz / 2, hy - sz / 2, sz, sz, 7); ctx.stroke();
      ctx.fillStyle = `rgba(255,255,100,${0.05 + pulse * 0.08})`; drawRoundedRect(hx - sz / 2, hy - sz / 2, sz, sz, 7); ctx.fill();
    }
  }
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife * 2); ctx.fillStyle = p.color;
    const sz = p.size * Math.min(1, p.life / p.maxLife + 0.3);
    const rot = p.rotation || 0;
    if (p.shape === 'star') {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(rot); ctx.beginPath();
      for (let i = 0; i < 8; i++) { const a = i * Math.PI / 4, r = i % 2 === 0 ? sz : sz * 0.4; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else if (p.shape === 'diamond') {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(rot); ctx.beginPath();
      ctx.moveTo(0, -sz); ctx.lineTo(sz * 0.6, 0); ctx.lineTo(0, sz); ctx.lineTo(-sz * 0.6, 0);
      ctx.closePath(); ctx.fill(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  ctx.globalAlpha = 1;
  for (const ft of state.floatingTexts) {
    ctx.globalAlpha = Math.min(1, ft.life / ft.maxLife * 2);
    ctx.font = `bold ${ft.size}px 'Segoe UI', system-ui, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (ft.isCombo && ft.scaleStart) {
      const elapsed = ft.maxLife - ft.life;
      const t = Math.min(elapsed / 0.3, 1);
      ft.scale = ft.scaleStart + (1 - ft.scaleStart) * (1 - (1 - t) * (1 - t)); // ease-out
      const safeScale = (ft.scale && isFinite(ft.scale) && ft.scale > 0) ? ft.scale : 1;
      ctx.save(); ctx.translate(ft.x, ft.y); ctx.scale(safeScale, safeScale);
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillText(ft.text, 1, 1);
      ctx.fillStyle = ft.color; ctx.fillText(ft.text, 0, 0);
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
      ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y);
    }
  }
  ctx.globalAlpha = 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawHUD() {
  if (state.screen !== SCREEN.PLAYING && state.screen !== SCREEN.LEVEL_COMPLETE && state.screen !== SCREEN.LEVEL_FAILED) return;
  if (!state.levelData) return;
  const ld = state.levelData;

  // User avatar (top-left area, after back button)
  if (firebase.user) {
    ctx.font = `${Math.floor(cellSize * 0.25)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(firebase.user.displayName || 'Player', 85, 14);
  }

  const tg = ctx.createLinearGradient(W / 2 - 80, 0, W / 2 + 80, 0);
  tg.addColorStop(0, '#ff6bca'); tg.addColorStop(0.5, '#ffb347'); tg.addColorStop(1, '#ff6bca');
  ctx.fillStyle = tg; ctx.font = `bold ${Math.floor(cellSize * 0.42)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(state.dailyChallenge ? 'Daily Challenge' : `Level ${state.level}`, W / 2, boardY * 0.2);

  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.floor(cellSize * 0.55)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillText(state.score.toLocaleString(), W / 2, boardY * 0.48);

  ctx.font = `${Math.floor(cellSize * 0.3)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = state.movesLeft <= 5 ? '#ff4757' : state.movesLeft <= 10 ? '#ffa502' : '#aaa';
  ctx.fillText(`${state.movesLeft} moves left`, W / 2, boardY * 0.7);

  // Star progress bar
  const maxSc = ld.stars[2], barW = cellSize * COLS, barH = 6, barX = boardX, barY2 = boardY - 12;
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; drawRoundedRect(barX, barY2, barW, barH, 3); ctx.fill();
  const fill = Math.min(state.score / maxSc, 1);
  if (fill > 0) { const bg = ctx.createLinearGradient(barX, 0, barX + barW, 0); bg.addColorStop(0, '#ff6bca'); bg.addColorStop(1, '#ffb347'); ctx.fillStyle = bg; drawRoundedRect(barX, barY2, Math.max(barW * fill, barH), barH, 3); ctx.fill(); }
  ctx.font = `${Math.floor(cellSize * 0.28)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  for (let i = 0; i < 3; i++) { ctx.fillStyle = state.score >= ld.stars[i] ? '#ffa502' : '#555'; ctx.fillText('★', barX + (ld.stars[i] / maxSc) * barW, barY2 - 1); }

  // Back button
  if (state.screen === SCREEN.PLAYING) {
    ctx.font = `${Math.floor(cellSize * 0.35)}px sans-serif`; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillText('← Menu', 12, 12);
  }
}

function drawBackground() {
  const t = performance.now() * 0.0002;
  const s1 = (Math.sin(t) + 1) * 0.5;
  const s2 = (Math.sin(t * 1.3 + 1) + 1) * 0.5;
  const s3 = (Math.sin(t * 0.7 + 2) + 1) * 0.5;
  const cx = W * 0.5, cy = H * 0.5;
  const grad = ctx.createRadialGradient(cx, cy * (0.8 + s1 * 0.4), 0, cx, cy, Math.max(W, H) * 0.8);
  grad.addColorStop(0, '#2a0a3e');
  grad.addColorStop(Math.min(0.3 + s2 * 0.2, 0.49), '#0d0a2e');
  grad.addColorStop(Math.min(0.6 + s3 * 0.15, 0.79), '#1a0533');
  grad.addColorStop(1, '#0d0a2e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════
// SECTION 6: GAME LOGIC
// ═══════════════════════════════════════════════════════

function randomCandy() { return Math.floor(Math.random() * CANDY_TYPES); }

function createBoard(levelData) {
  state.board = [];
  for (let r = 0; r < ROWS; r++) {
    state.board[r] = [];
    for (let c = 0; c < COLS; c++) {
      const bl = (levelData && levelData.blockers && levelData.blockers[r] && levelData.blockers[r][c]) || BLOCKER.NONE;
      if (bl === BLOCKER.STONE) { state.board[r][c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.STONE); continue; }
      if (bl === BLOCKER.CHOCOLATE) { state.board[r][c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.CHOCOLATE); continue; }
      let type, att = 0;
      do { type = randomCandy(); att++; } while (att < 50 && ((c >= 2 && state.board[r][c - 1].type === type && state.board[r][c - 2].type === type) || (r >= 2 && state.board[r - 1][c].type === type && state.board[r - 2][c].type === type)));
      state.board[r][c] = makeCell(type, SPECIAL.NONE, bl);
    }
  }
}

function isPlayable(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
  const cell = state.board[r][c];
  return cell && cell.type >= 0 && cell.blocker !== BLOCKER.STONE && cell.blocker !== BLOCKER.CHOCOLATE;
}

function findMatchGroups() {
  const groups = [];
  for (let r = 0; r < ROWS; r++) { let c = 0; while (c < COLS) { if (!isPlayable(r, c)) { c++; continue; } let end = c; while (end + 1 < COLS && isPlayable(r, end + 1) && state.board[r][end + 1].type === state.board[r][c].type) end++; if (end - c >= 2) groups.push({ cells: Array.from({ length: end - c + 1 }, (_, i) => ({ r, c: c + i })), dir: 'h' }); c = end + 1; } }
  for (let c = 0; c < COLS; c++) { let r = 0; while (r < ROWS) { if (!isPlayable(r, c)) { r++; continue; } let end = r; while (end + 1 < ROWS && isPlayable(end + 1, c) && state.board[end + 1][c].type === state.board[r][c].type) end++; if (end - r >= 2) groups.push({ cells: Array.from({ length: end - r + 1 }, (_, i) => ({ r: r + i, c })), dir: 'v' }); r = end + 1; } }
  return groups;
}

function findAllMatchedCells() { const g = findMatchGroups(), s = new Set(); for (const gr of g) for (const c of gr.cells) s.add(c.r + ',' + c.c); return [...s]; }

function detectSpecials(groups) {
  const specials = [], at = new Set();
  for (let i = 0; i < groups.length; i++) for (let j = i + 1; j < groups.length; j++) { if (groups[i].dir === groups[j].dir) continue; for (const c1 of groups[i].cells) for (const c2 of groups[j].cells) if (c1.r === c2.r && c1.c === c2.c) { const k = c1.r + ',' + c1.c; if (!at.has(k)) { at.add(k); specials.push({ r: c1.r, c: c1.c, special: SPECIAL.WRAPPED, type: state.board[c1.r][c1.c].type }); } } }
  for (const g of groups) {
    if (g.cells.length >= 5) { const m = g.cells[Math.floor(g.cells.length / 2)], k = m.r + ',' + m.c; if (!at.has(k)) { at.add(k); specials.push({ r: m.r, c: m.c, special: SPECIAL.COLOR_BOMB, type: state.board[m.r][m.c].type }); } }
    else if (g.cells.length === 4) { for (const cell of g.cells) { const k = cell.r + ',' + cell.c; if (!at.has(k)) { at.add(k); specials.push({ r: cell.r, c: cell.c, special: g.dir === 'h' ? SPECIAL.STRIPED_H : SPECIAL.STRIPED_V, type: state.board[cell.r][cell.c].type }); break; } } }
  }
  return specials;
}

function getSpecialRemoval(r, c, special) {
  const s = new Set();
  if (special === SPECIAL.STRIPED_H) { for (let cc = 0; cc < COLS; cc++) if (state.board[r][cc].blocker !== BLOCKER.STONE) s.add(r + ',' + cc); }
  else if (special === SPECIAL.STRIPED_V) { for (let rr = 0; rr < ROWS; rr++) if (state.board[rr][c].blocker !== BLOCKER.STONE) s.add(rr + ',' + c); }
  else if (special === SPECIAL.WRAPPED) { for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker !== BLOCKER.STONE) s.add(nr + ',' + nc); } }
  return s;
}

function handleSpecialCombo(r1, c1, r2, c2) {
  const s1 = state.board[r1][c1].special, s2 = state.board[r2][c2].special;
  if (s1 === SPECIAL.NONE && s2 === SPECIAL.NONE) return null;
  const toR = new Set(), isS = s => s === SPECIAL.STRIPED_H || s === SPECIAL.STRIPED_V;

  if (s1 === SPECIAL.COLOR_BOMB && s2 === SPECIAL.COLOR_BOMB) { for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type >= 0 || state.board[r][c].blocker === BLOCKER.CHOCOLATE) toR.add(r + ',' + c); return toR; }

  // Color bomb + striped
  if (s1 === SPECIAL.COLOR_BOMB && isS(s2)) { const tt = state.board[r2][c2].type; toR.add(r1 + ',' + c1); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) { state.board[r][c].special = Math.random() > 0.5 ? SPECIAL.STRIPED_H : SPECIAL.STRIPED_V; for (const e of getSpecialRemoval(r, c, state.board[r][c].special)) toR.add(e); toR.add(r + ',' + c); } return toR; }
  if (s2 === SPECIAL.COLOR_BOMB && isS(s1)) { const tt = state.board[r1][c1].type; toR.add(r2 + ',' + c2); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) { state.board[r][c].special = Math.random() > 0.5 ? SPECIAL.STRIPED_H : SPECIAL.STRIPED_V; for (const e of getSpecialRemoval(r, c, state.board[r][c].special)) toR.add(e); toR.add(r + ',' + c); } return toR; }

  // Color bomb + wrapped
  if (s1 === SPECIAL.COLOR_BOMB && s2 === SPECIAL.WRAPPED) { const tt = state.board[r2][c2].type; toR.add(r1 + ',' + c1); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) { for (const e of getSpecialRemoval(r, c, SPECIAL.WRAPPED)) toR.add(e); toR.add(r + ',' + c); } return toR; }
  if (s2 === SPECIAL.COLOR_BOMB && s1 === SPECIAL.WRAPPED) { const tt = state.board[r1][c1].type; toR.add(r2 + ',' + c2); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) { for (const e of getSpecialRemoval(r, c, SPECIAL.WRAPPED)) toR.add(e); toR.add(r + ',' + c); } return toR; }

  // Color bomb + normal: just remove all of that color (no striped conversion)
  if (s1 === SPECIAL.COLOR_BOMB) { const tt = state.board[r2][c2].type; toR.add(r1 + ',' + c1); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) toR.add(r + ',' + c); return toR; }
  if (s2 === SPECIAL.COLOR_BOMB) { const tt = state.board[r1][c1].type; toR.add(r2 + ',' + c2); for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].type === tt) toR.add(r + ',' + c); return toR; }

  if (isS(s1) && isS(s2)) { for (let cc = 0; cc < COLS; cc++) { if (state.board[r1][cc].blocker !== BLOCKER.STONE) toR.add(r1 + ',' + cc); if (state.board[r2][cc].blocker !== BLOCKER.STONE) toR.add(r2 + ',' + cc); } for (let rr = 0; rr < ROWS; rr++) { if (state.board[rr][c1].blocker !== BLOCKER.STONE) toR.add(rr + ',' + c1); if (state.board[rr][c2].blocker !== BLOCKER.STONE) toR.add(rr + ',' + c2); } return toR; }
  if (s1 === SPECIAL.WRAPPED && s2 === SPECIAL.WRAPPED) { const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2); for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) { const nr = cr + dr, nc = cc + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker !== BLOCKER.STONE) toR.add(nr + ',' + nc); } return toR; }
  if ((isS(s1) && s2 === SPECIAL.WRAPPED) || (s1 === SPECIAL.WRAPPED && isS(s2))) { const cr = Math.floor((r1 + r2) / 2), cc = Math.floor((c1 + c2) / 2); for (let d = -1; d <= 1; d++) { for (let i = 0; i < COLS; i++) { const nr = cr + d; if (nr >= 0 && nr < ROWS && state.board[nr][i].blocker !== BLOCKER.STONE) toR.add(nr + ',' + i); } for (let i = 0; i < ROWS; i++) { const nc = cc + d; if (nc >= 0 && nc < COLS && state.board[i][nc].blocker !== BLOCKER.STONE) toR.add(i + ',' + nc); } } return toR; }

}

function swap(r1, c1, r2, c2) { const t = state.board[r1][c1]; state.board[r1][c1] = state.board[r2][c2]; state.board[r2][c2] = t; }

function gravity() {
  const newTiles = [], fallingCells = [];
  for (let c = 0; c < COLS; c++) {
    const bRows = new Set();
    for (let r = 0; r < ROWS; r++) { const cell = state.board[r][c]; if (cell.blocker === BLOCKER.STONE || cell.blocker === BLOCKER.CHOCOLATE) bRows.add(r); }
    let se = ROWS - 1;
    while (se >= 0) {
      if (bRows.has(se)) { se--; continue; }
      let ss = se; while (ss > 0 && !bRows.has(ss - 1)) ss--;
      let wp = se;
      for (let r = se; r >= ss; r--) {
        if (state.board[r][c].type >= 0) {
          if (r !== wp) {
            const cell = state.board[r][c];
            const oldY = cellToScreen(r, c).y;
            state.board[wp][c] = cell;
            state.board[r][c] = makeCell(EMPTY);
            // Set drawY to old position for fall animation
            cell.drawY = oldY;
            fallingCells.push({ r: wp, c, cell });
          }
          wp--;
        }
      }
      for (let r = wp; r >= ss; r--) {
        if (state.board[r][c].type === EMPTY && state.board[r][c].blocker === BLOCKER.NONE) {
          const cell = makeCell(randomCandy());
          cell.scale = 0;
          // Start new tiles above the board for drop-in effect
          cell.drawY = cellToScreen(ss - 1, c).y - cellSize;
          state.board[r][c] = cell;
          newTiles.push({ r, c });
          fallingCells.push({ r, c, cell });
        }
      }
      se = ss - 1;
    }
  }
  return { newTiles, fallingCells };
}

async function animateGravity(fallingCells) {
  const promises = [];
  for (const { r, c, cell } of fallingCells) {
    if (cell.drawY !== undefined) {
      const targetY = cellToScreen(r, c).y;
      const dist = Math.abs(targetY - cell.drawY);
      const dur = Math.min(0.08 + dist / (cellSize * 12), 0.35);
      promises.push(tween(cell, { drawY: targetY }, dur, 'bounce'));
    }
  }
  if (promises.length) await Promise.all(promises);
  // Clean up drawY
  for (const { cell } of fallingCells) delete cell.drawY;
}

function spreadChocolate() {
  const chocs = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (state.board[r][c].blocker === BLOCKER.CHOCOLATE) chocs.push({ r, c });
  if (!chocs.length) return;
  const cands = [];
  for (const { r, c } of chocs) for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].type >= 0 && state.board[nr][nc].blocker === BLOCKER.NONE) cands.push({ r: nr, c: nc }); }
  if (cands.length) { const t = cands[Math.floor(Math.random() * cands.length)]; state.board[t.r][t.c] = makeCell(EMPTY, SPECIAL.NONE, BLOCKER.CHOCOLATE); addParticle(cellToScreen(t.r, t.c).x, cellToScreen(t.r, t.c).y, '#5c3317', 4); }
}

function clearAdjacentChocolate(matchedSet) {
  const rm = [];
  for (const key of matchedSet) { const [r, c] = key.split(',').map(Number); for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && state.board[nr][nc].blocker === BLOCKER.CHOCOLATE && !rm.some(x => x.r === nr && x.c === nc)) rm.push({ r: nr, c: nc }); } }
  for (const { r, c } of rm) { state.board[r][c] = makeCell(EMPTY); const p = cellToScreen(r, c); addParticle(p.x, p.y, '#7b4a2b', 8); if (state.goalType === GOAL.CLEAR_CHOCOLATE && state.goalProgress.chocolateLeft > 0) state.goalProgress.chocolateLeft--; }
  return rm.length > 0;
}

function clearIceAt(r, c) {
  const cell = state.board[r][c]; const p = cellToScreen(r, c);
  if (cell.blocker === BLOCKER.ICE2) { cell.blocker = BLOCKER.ICE1; addParticle(p.x, p.y, '#aaddff', 4); return true; }
  if (cell.blocker === BLOCKER.ICE1) { cell.blocker = BLOCKER.NONE; addParticle(p.x, p.y, '#aaddff', 6); return true; }
  return false;
}

async function animateNewTiles(tiles) {
  const promises = [];
  for (const { r, c } of tiles) {
    const cell = state.board[r][c];
    if (cell && cell.scale === 0) { cell.scale = 0; promises.push(tween(cell, { scale: 1 }, 0.2, 'bounce')); }
  }
  await Promise.all(promises);
}

async function processMatches() {
  let cascade = 0, clearedChoc = false;
  const gen = state.levelGen; // capture current generation
  try {
  while (true) {
    if (state.levelGen !== gen) return; // level changed, abort
    if (state.screen !== SCREEN.PLAYING && state.screen !== SCREEN.LEVEL_COMPLETE && state.screen !== SCREEN.LEVEL_FAILED) return;
    const groups = findMatchGroups(), allM = findAllMatchedCells();
    if (!allM.length) break;
    cascade++; state.cascade = cascade;
    const specials = detectSpecials(groups);

    let pts = 0;
    for (const g of groups) { if (g.cells.length === 3) pts += 30; else if (g.cells.length === 4) pts += 60; else pts += 100; }
    for (const s of specials) { if (s.special === SPECIAL.WRAPPED) pts += 80; else if (s.special === SPECIAL.COLOR_BOMB) pts += 100; else pts += 50; }
    const mult = cascade > 1 ? cascade : 1;
    state.score += pts * mult;
    sfxMatch(cascade);

    if (cascade > 1) {
      state.shakeAmount = Math.min(cascade * 3, 12); state.shakeTime = 0;
      // Combo celebration with escalating messages
      let msg = cascade + 'x COMBO!', msgColor = '#ff6bca';
      for (const cm of COMBO_MSGS) { if (cascade >= cm.min) { msg = cm.text; msgColor = cm.color; } }
      const ft = { x: W / 2, y: boardY - 30, text: msg, color: msgColor, life: 1.2, maxLife: 1.2, vy: -70, size: Math.floor(cellSize * (0.5 + cascade * 0.08)), scaleStart: 1.8, scale: 1.8, isCombo: true };
      state.floatingTexts.push(ft);
      sfxCombo(cascade);
      // Screen flash for big combos
      if (cascade >= 4) { state.screenFlash = 0.3; }
      // Edge flash for combo >= 3
      if (cascade >= 3) { state.edgeFlash = { color: msgColor, life: 0.4 }; }
    }

    const matchedSet = new Set(allM), specPos = new Set(specials.map(s => s.r + ',' + s.c)), extraR = new Set();
    for (const key of matchedSet) { if (specPos.has(key)) continue; const [r, c] = key.split(',').map(Number); const cell = state.board[r][c]; if (cell.special !== SPECIAL.NONE && cell.special !== SPECIAL.COLOR_BOMB) { sfxExplosion(); for (const e of getSpecialRemoval(r, c, cell.special)) extraR.add(e); addParticle(cellToScreen(r, c).x, cellToScreen(r, c).y, '#fff', 12); state.shakeAmount = Math.max(state.shakeAmount, 8); state.shakeTime = 0; } }
    for (const e of extraR) matchedSet.add(e);

    if (clearAdjacentChocolate(matchedSet)) clearedChoc = true;

    // Animate match squish: punch then shrink
    const squishTweens = [];
    for (const key of matchedSet) {
      if (specPos.has(key)) continue;
      const [r, c] = key.split(',').map(Number);
      const cell = state.board[r][c];
      if (cell.type >= 0) {
        const p = cellToScreen(r, c); addParticle(p.x, p.y, COLORS[cell.type % CANDY_TYPES].main, 5);
        cell.removeScale = 1; cell.alpha = 1;
        squishTweens.push(
          Promise.race([
            tween(cell, { removeScale: 1.25 }, 0.08, 'easeOut').then(() => tween(cell, { removeScale: 0, alpha: 0 }, 0.12, 'easeIn')),
            new Promise(r => setTimeout(r, 300))
          ])
        );
      }
    }
    if (squishTweens.length) await Promise.all(squishTweens);

    if (groups.length > 0) { const mg = groups[0].cells[Math.floor(groups[0].cells.length / 2)]; const p = cellToScreen(mg.r, mg.c); addFloatingText(p.x, p.y - 5, '+' + (pts * mult), cascade > 1 ? '#ffb347' : '#fff'); }

    for (const key of matchedSet) {
      const [r, c] = key.split(',').map(Number);
      if (specPos.has(key)) continue;
      // Track goals
      if (state.jellyBoard && state.jellyBoard[r][c] > 0) {
        state.jellyBoard[r][c]--;
        if (state.jellyBoard[r][c] <= 0 && state.goalProgress.jellyLeft > 0) state.goalProgress.jellyLeft--;
      }
      if (state.goalType === GOAL.COLLECT && state.board[r][c].type === state.goalProgress.collectType) {
        state.goalProgress.collected = (state.goalProgress.collected || 0) + 1;
      }
      // ICE2 requires 2 matches: first match reduces to ICE1, candy stays
      const hadIce = clearIceAt(r, c);
      if (hadIce && state.board[r][c].blocker !== BLOCKER.NONE) {
        // Cell still has ice — don't destroy the candy, just cleared one layer
        continue;
      }
      if (state.board[r][c].blocker !== BLOCKER.STONE) state.board[r][c] = makeCell(EMPTY);
    }
    for (const s of specials) { state.board[s.r][s.c] = makeCell(s.type, s.special); state.board[s.r][s.c].scale = 0; sfxSpecialCreate(); addParticle(cellToScreen(s.r, s.c).x, cellToScreen(s.r, s.c).y, '#fff', 8); }

    // Animate special creation
    const specTweens = [];
    for (const s of specials) specTweens.push(tween(state.board[s.r][s.c], { scale: 1 }, 0.3, 'bounce'));
    if (specTweens.length) await Promise.all(specTweens);

    await sleep(50);
    const { newTiles, fallingCells } = gravity();
    await animateGravity(fallingCells);
    await animateNewTiles(newTiles);
    await sleep(50);
  }
  if (!clearedChoc) spreadChocolate();
  state.cascade = 0;
  } catch(e) {
    console.error('processMatches error:', e);
    state.cascade = 0;
    state.tweens = [];
  }
}

async function endOfLevelBonus() {
  state.bonusPhase = true;
  const n = Math.max(state.movesLeft, 0);
  if (!n) { state.bonusPhase = false; return; }
  for (let i = 0; i < n; i++) {
    const play = []; for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (isPlayable(r, c)) play.push({ r, c });
    if (!play.length) break;
    const t = play[Math.floor(Math.random() * play.length)];
    const st = [SPECIAL.STRIPED_H, SPECIAL.STRIPED_V, SPECIAL.WRAPPED][Math.floor(Math.random() * 3)];
    state.board[t.r][t.c].special = st;
    const rm = getSpecialRemoval(t.r, t.c, st); sfxExplosion(); state.shakeAmount = 5; state.shakeTime = 0;
    for (const key of rm) { const [rr, cc] = key.split(',').map(Number); if (state.board[rr][cc].type >= 0 && state.board[rr][cc].blocker !== BLOCKER.STONE) { addParticle(cellToScreen(rr, cc).x, cellToScreen(rr, cc).y, COLORS[state.board[rr][cc].type % CANDY_TYPES].main, 4); state.board[rr][cc] = makeCell(EMPTY); } }
    const bp = 50 + rm.size * 10; state.score += bp; state.movesLeft--;
    addFloatingText(cellToScreen(t.r, t.c).x, cellToScreen(t.r, t.c).y, '+' + bp, '#ffb347');
    await sleep(100); const { fallingCells: fc } = gravity(); await animateGravity(fc); await sleep(50);
  }
  state.bonusPhase = false;
}

async function trySwap(r, c) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;
  state.animating = true;
  const sr = state.selected.r, sc = state.selected.c;
  state.selected = null; state.hintTimer = 0; state.hintMove = null;
  ensureAudio();
  try {

  // Animate swap
  const c1 = state.board[sr][sc], c2 = state.board[r][c];
  const p1 = cellToScreen(sr, sc), p2 = cellToScreen(r, c);
  c1.drawX = p1.x; c1.drawY = p1.y; c2.drawX = p2.x; c2.drawY = p2.y;
  swap(sr, sc, r, c);
  const nc1 = state.board[sr][sc], nc2 = state.board[r][c];
  nc1.drawX = p2.x; nc1.drawY = p2.y; nc2.drawX = p1.x; nc2.drawY = p1.y;
  await Promise.all([tween(nc1, { drawX: p1.x, drawY: p1.y }, 0.18, 'easeInOut'), tween(nc2, { drawX: p2.x, drawY: p2.y }, 0.18, 'easeInOut')]);
  delete nc1.drawX; delete nc1.drawY; delete nc2.drawX; delete nc2.drawY;

  const combo = handleSpecialCombo(sr, sc, r, c);
  if (combo) {
    sfxSwap(); state.movesLeft--;
    sfxExplosion(); state.shakeAmount = 12; state.shakeTime = 0;
    for (const key of combo) {
      const [rr, cc] = key.split(',').map(Number);
      if (state.board[rr][cc].blocker === BLOCKER.STONE) continue;
      // Track goals for combo removals
      if (state.jellyBoard && state.jellyBoard[rr][cc] > 0) {
        state.jellyBoard[rr][cc] = 0;
        if (state.goalProgress.jellyLeft > 0) state.goalProgress.jellyLeft--;
      }
      if (state.goalType === GOAL.COLLECT && state.board[rr][cc].type === state.goalProgress.collectType) {
        state.goalProgress.collected = (state.goalProgress.collected || 0) + 1;
      }
      clearIceAt(rr, cc);
      const p = cellToScreen(rr, cc);
      if (state.board[rr][cc].type >= 0) addParticle(p.x, p.y, COLORS[state.board[rr][cc].type % CANDY_TYPES].main, 6);
      else if (state.board[rr][cc].blocker === BLOCKER.CHOCOLATE) { addParticle(p.x, p.y, '#7b4a2b', 6); if (state.goalType === GOAL.CLEAR_CHOCOLATE && state.goalProgress.chocolateLeft > 0) state.goalProgress.chocolateLeft--; }
      state.board[rr][cc] = makeCell(EMPTY);
    }
    state.score += combo.size * 30; addFloatingText(W / 2, H / 2, '+' + (combo.size * 30), '#ff6bca', Math.floor(cellSize * 0.6));
    await sleep(150); const { newTiles: nt, fallingCells: fc2 } = gravity(); await animateGravity(fc2); await animateNewTiles(nt); await processMatches();

  }

  const matches = findAllMatchedCells();
  if (!matches.length) {
    sfxBadSwap();
    // Animate swap back
    swap(sr, sc, r, c);
    const b1 = state.board[sr][sc], b2 = state.board[r][c];
    b1.drawX = p2.x; b1.drawY = p2.y; b2.drawX = p1.x; b2.drawY = p1.y;
    await Promise.all([tween(b1, { drawX: p1.x, drawY: p1.y }, 0.18, 'easeInOut'), tween(b2, { drawX: p2.x, drawY: p2.y }, 0.18, 'easeInOut')]);
    delete b1.drawX; delete b1.drawY; delete b2.drawX; delete b2.drawY;
    state.animating = false; return;
  }

  sfxSwap(); state.movesLeft--;
  await processMatches(); state.animating = false; await checkLevelEnd();
  } catch(e) {
    console.error('trySwap error:', e);
    state.animating = false;
    state.tweens = []; // clear any stuck tweens
  }
}

function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!isPlayable(r, c)) continue;
    const s = state.board[r][c].special;
    if (s === SPECIAL.COLOR_BOMB) { for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && isPlayable(nr, nc)) return { r, c, r2: nr, c2: nc }; } }
    if (s !== SPECIAL.NONE) { for (const [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && isPlayable(nr, nc) && state.board[nr][nc].special !== SPECIAL.NONE) return { r, c, r2: nr, c2: nc }; } }
    if (c + 1 < COLS && isPlayable(r, c + 1)) { swap(r, c, r, c + 1); const h = findAllMatchedCells().length > 0; swap(r, c, r, c + 1); if (h) return { r, c, r2: r, c2: c + 1 }; }
    if (r + 1 < ROWS && isPlayable(r + 1, c)) { swap(r, c, r + 1, c); const h = findAllMatchedCells().length > 0; swap(r, c, r + 1, c); if (h) return { r, c, r2: r + 1, c2: c }; }
  }
  return null;
}

function shuffleBoard() {
  const play = []; for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (isPlayable(r, c) && state.board[r][c].special === SPECIAL.NONE) play.push({ r, c });
  for (let i = play.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)), a = play[i], b = play[j]; const t = state.board[a.r][a.c].type; state.board[a.r][a.c].type = state.board[b.r][b.c].type; state.board[b.r][b.c].type = t; }
  let att = 0; while (findAllMatchedCells().length > 0 && att < 200) { const a = play[Math.floor(Math.random() * play.length)]; state.board[a.r][a.c].type = randomCandy(); att++; }
}

async function showWin() {
  if (state.movesLeft > 0) await endOfLevelBonus();
  const ld = state.levelData;
  const es = state.score >= ld.stars[2] ? 3 : state.score >= ld.stars[1] ? 2 : 1;
  state.stars = es;
  const prev = state.progress[state.level] || 0;
  if (es === 3 && state.boosterCharges < 3) { state.boosterCharges++; }
  if (es > prev) { state.progress[state.level] = es; await saveProgress(); } else { saveProgressLocal(); }
  stopBgMusic(); state.screen = SCREEN.LEVEL_COMPLETE; state.winAnimTime = 0; state.winFinalScore = state.score; sfxWin();
  // Fireworks celebration
  addConfetti(W / 2, H * 0.35, 50);
  addConfetti(W * 0.3, H * 0.4, 25);
  addConfetti(W * 0.7, H * 0.4, 25);
  state.screenFlash = 0.4;
}

function isGoalMet() {
  const ld = state.levelData;
  if (ld.goal === GOAL.CLEAR_JELLY) return state.goalProgress.jellyLeft <= 0;
  if (ld.goal === GOAL.COLLECT) return (state.goalProgress.collected || 0) >= state.goalProgress.target;
  if (ld.goal === GOAL.CLEAR_CHOCOLATE) return (state.goalProgress.chocolateLeft || 0) <= 0;
  return state.score >= ld.stars[0]; // SCORE goal
}

async function checkLevelEnd() {
  if (state.screen !== SCREEN.PLAYING) return;

  // Check goal-based win (can win with moves remaining)
  if (isGoalMet() && state.goalType !== GOAL.SCORE) {
    await showWin();
    return;
  }

  if (state.movesLeft <= 0) {
    if (isGoalMet()) { await showWin(); }
    else { stopBgMusic(); state.screen = SCREEN.LEVEL_FAILED; state.loseAnimTime = 0; state.loseCandies = Array.from({length: 5}, (_, i) => ({ x: W * 0.3 + i * W * 0.1, y: -30 - i * 20, vy: 0, rot: 0, rotSpeed: (Math.random() - 0.5) * 3, type: Math.floor(Math.random() * CANDY_TYPES), alpha: 1 })); sfxLose(); }
    return;
  }
  if (!hasValidMoves()) { shuffleBoard(); addFloatingText(W / 2, H / 2, 'SHUFFLE!', '#ffb347', Math.floor(cellSize * 0.6)); if (!hasValidMoves()) shuffleBoard(); }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Seeded PRNG for deterministic level generation (mulberry32)
function seededRng(seed) {
  let s = seed | 0;
  return () => { s = (s + 0x6D2B79F5) | 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
}
const levelRng = seededRng(42);

function placeRandomBlockers(b, type, count) { let p = 0, a = 0; while (p < count && a < 300) { const r = 1 + Math.floor(levelRng() * (ROWS - 2)), c = 1 + Math.floor(levelRng() * (COLS - 2)); if (b[r][c] === BLOCKER.NONE) { b[r][c] = type; p++; } a++; } }

function generateLevels() {
  const levels = [];
  for (let i = 1; i <= 50; i++) {
    const tier = i <= 10 ? 'easy' : i <= 20 ? 'medium' : i <= 30 ? 'hard' : i <= 40 ? 'expert' : 'master';
    let m;
    if (tier === 'easy') m = 40 - Math.floor(i * 0.7);
    else if (tier === 'medium') m = 30 - Math.floor((i - 10) * 0.5);
    else if (tier === 'hard') m = 25 - Math.floor((i - 20) * 0.4);
    else if (tier === 'expert') m = 22 - Math.floor((i - 30) * 0.3);
    else m = 18 - Math.floor((i - 40) * 0.2);
    m = Math.max(m, 12);
    const bs = 400 + i * 250, stars = [bs, Math.floor(bs * 1.7), Math.floor(bs * 2.6)];
    const bl = Array.from({ length: ROWS }, () => Array(COLS).fill(BLOCKER.NONE));
    if (i >= 8 && i <= 10) placeRandomBlockers(bl, BLOCKER.ICE1, 2 + Math.floor((i - 7) * 1.2));
    else if (i >= 11 && i <= 13) { placeRandomBlockers(bl, BLOCKER.ICE1, 3 + Math.floor((i - 10) * 0.8)); placeRandomBlockers(bl, BLOCKER.ICE2, 1 + Math.floor((i - 10) * 0.7)); }
    else if (i >= 14 && i <= 19) { placeRandomBlockers(bl, BLOCKER.CHOCOLATE, 1 + Math.floor((i - 13) * 0.7)); placeRandomBlockers(bl, BLOCKER.ICE1, 2 + Math.floor((i - 13) * 0.5)); }
    else if (i >= 20 && i <= 30) { placeRandomBlockers(bl, BLOCKER.STONE, 1 + Math.floor((i - 19) * 0.4)); placeRandomBlockers(bl, BLOCKER.CHOCOLATE, 1 + Math.floor((i - 19) * 0.5)); placeRandomBlockers(bl, BLOCKER.ICE2, 2 + Math.floor((i - 19) * 0.4)); }
    else if (i >= 31 && i <= 40) { placeRandomBlockers(bl, BLOCKER.STONE, 2 + Math.floor((i - 30) * 0.5)); placeRandomBlockers(bl, BLOCKER.CHOCOLATE, 2 + Math.floor((i - 30) * 0.6)); placeRandomBlockers(bl, BLOCKER.ICE2, 3 + Math.floor((i - 30) * 0.5)); placeRandomBlockers(bl, BLOCKER.ICE1, 2); }
    else if (i >= 41) { placeRandomBlockers(bl, BLOCKER.STONE, 3 + Math.floor((i - 40) * 0.5)); placeRandomBlockers(bl, BLOCKER.CHOCOLATE, 3 + Math.floor((i - 40) * 0.7)); placeRandomBlockers(bl, BLOCKER.ICE2, 4 + Math.floor((i - 40) * 0.4)); placeRandomBlockers(bl, BLOCKER.ICE1, 3); }

    // Assign varied objectives
    let goal = GOAL.SCORE, goalData = {};
    if (i <= 3) {
      goal = GOAL.SCORE;
    } else if (i % 5 === 0) {
      goal = GOAL.COLLECT;
      const ct = Math.floor(levelRng() * CANDY_TYPES);
      goalData = { collectType: ct, collectTarget: 15 + Math.floor(i * 1.5) };
    } else if (i >= 6 && i % 3 === 0) {
      goal = GOAL.CLEAR_JELLY;
      const jellyCount = 10 + Math.floor(i * 0.8);
      goalData = { jellyCount: Math.min(jellyCount, 40) };
    } else if (i >= 14 && i % 4 === 1) {
      goal = GOAL.CLEAR_CHOCOLATE;
      goalData = {};
    }

    levels.push({ level: i, moves: m, stars, blockers: bl, goal, goalData });
  }
  return levels;
}
const ALL_LEVELS = generateLevels();

// Daily Challenge: date-seeded level
function getDailySeed() { const d = new Date(); return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate(); }
function generateDailyLevel() {
  const rng = seededRng(getDailySeed());
  const goals = [GOAL.SCORE, GOAL.CLEAR_JELLY, GOAL.COLLECT, GOAL.CLEAR_CHOCOLATE];
  const goal = goals[Math.floor(rng() * goals.length)];
  const m = 20 + Math.floor(rng() * 10);
  const bs = 5000 + Math.floor(rng() * 5000), stars = [bs, Math.floor(bs * 1.7), Math.floor(bs * 2.6)];
  const bl = Array.from({ length: ROWS }, () => Array(COLS).fill(BLOCKER.NONE));
  const blockerTypes = [BLOCKER.ICE1, BLOCKER.ICE2, BLOCKER.CHOCOLATE, BLOCKER.STONE];
  for (const bt of blockerTypes) { const n = Math.floor(rng() * 5); if (n > 0) placeRandomBlockers(bl, bt, n); }
  let goalData = {};
  if (goal === GOAL.COLLECT) { goalData = { collectType: Math.floor(rng() * CANDY_TYPES), collectTarget: 20 + Math.floor(rng() * 20) }; }
  else if (goal === GOAL.CLEAR_JELLY) { goalData = { jellyCount: 15 + Math.floor(rng() * 15) }; }
  return { level: 0, moves: m, stars, blockers: bl, goal, goalData };
}

let pStartX = null, pStartY = null;
function getClickedCell(px, py) { const c = Math.floor((px - boardX) / cellSize), r = Math.floor((py - boardY) / cellSize); return (r >= 0 && r < ROWS && c >= 0 && c < COLS) ? { r, c } : null; }
function isSoundToggle(px, py) { const hs = Math.max(55, cellSize); return px > W - hs && py < hs * 0.8; }
function isBackButton(px, py) { return px < 100 && py < 55 && (state.screen === SCREEN.PLAYING || state.screen === SCREEN.LEADERBOARD); }

function handleBoardClick(px, py) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;

  // Check booster button click
  if (state._boosterBtn) {
    const bb = state._boosterBtn;
    if (px >= bb.x && px <= bb.x + bb.w && py >= bb.y && py <= bb.y + bb.h) {
      ensureAudio();
      if (state.boosterCharges > 0) { state.boosterCharges--; state.movesLeft += 5; saveProgressLocal(); sfxSpecialCreate(); addFloatingText(W / 2, boardY * 0.7, '+5 Moves!', '#2ed573', Math.floor(cellSize * 0.4)); }
      else { sfxBadSwap(); }
      return;
    }
  }
  // Check hammer button click
  if (state._hammerBtn) {
    const hb = state._hammerBtn;
    if (px >= hb.x && px <= hb.x + hb.w && py >= hb.y && py <= hb.y + hb.h) {
      ensureAudio();
      if (state.hammerAvailable && !state.hammerActive) { state.hammerActive = true; state.selected = null; sfxClick(); }
      else if (state.hammerActive) { state.hammerActive = false; sfxClick(); }
      return;
    }
  }

  const cell = getClickedCell(px, py); if (!cell) return;

  // Hammer mode: destroy any candy
  if (state.hammerActive && state.hammerAvailable) {
    if (isPlayable(cell.r, cell.c)) {
      ensureAudio(); sfxExplosion();
      const p = cellToScreen(cell.r, cell.c);
      addParticle(p.x, p.y, COLORS[state.board[cell.r][cell.c].type % CANDY_TYPES].main, 12);
      // Track goals
      if (state.jellyBoard && state.jellyBoard[cell.r][cell.c] > 0) {
        state.jellyBoard[cell.r][cell.c] = 0;
        if (state.goalProgress.jellyLeft > 0) state.goalProgress.jellyLeft--;
      }
      if (state.goalType === GOAL.COLLECT && state.board[cell.r][cell.c].type === state.goalProgress.collectType) {
        state.goalProgress.collected = (state.goalProgress.collected || 0) + 1;
      }
      state.board[cell.r][cell.c] = makeCell(EMPTY);
      state.hammerAvailable = false;
      state.hammerActive = false;
      state.shakeAmount = 5; state.shakeTime = 0;
      state.animating = true; // Set before async to prevent race
      // Gravity after hammer
      (async () => {
        try {
          await sleep(100);
          const { newTiles, fallingCells } = gravity();
          await animateGravity(fallingCells);
          await animateNewTiles(newTiles);
          await processMatches();
          state.animating = false;
          await checkLevelEnd();
        } catch(e) {
          console.error('hammer async error:', e);
          state.animating = false;
          state.tweens = [];
        }
      })();
    }
    return;
  }

  if (!isPlayable(cell.r, cell.c)) return;
  ensureAudio();
  if (!state.selected) { state.selected = cell; sfxClick(); return; }
  if (state.selected.r === cell.r && state.selected.c === cell.c) { state.selected = null; return; }
  const dr = Math.abs(state.selected.r - cell.r), dc = Math.abs(state.selected.c - cell.c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) trySwap(cell.r, cell.c);
  else { state.selected = cell; sfxClick(); }
}

function handleSwipe(sx, sy, ex, ey) {
  if (state.animating || state.screen !== SCREEN.PLAYING) return;
  const cell = getClickedCell(sx, sy); if (!cell) return;
  const dx = ex - sx, dy = ey - sy;
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12) { handleBoardClick(sx, sy); return; }
  if (!isPlayable(cell.r, cell.c)) return;
  let tr, tc;
  if (Math.abs(dx) > Math.abs(dy)) { tr = cell.r; tc = cell.c + (dx > 0 ? 1 : -1); } else { tr = cell.r + (dy > 0 ? 1 : -1); tc = cell.c; }
  if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS && isPlayable(tr, tc)) { state.selected = cell; ensureAudio(); trySwap(tr, tc); }
}

function getLevelSelectLayout() {
  const gc = 5, bs = Math.max(Math.min((W - 80) / gc - 10, 64), 36);
  const gx = Math.max(6, Math.floor((W - gc * bs - 40) / (gc - 1))), gy = Math.max(12, Math.floor(bs * 0.3));
  const tw = gc * bs + (gc - 1) * gx;
  return { gc, bs, gx, gy, sx: (W - tw) / 2, sy: H * 0.22 };
}

function handleLevelSelectClick(px, py) {
  const { gc, bs, gx, gy, sx, sy } = getLevelSelectLayout();
  // Daily Challenge button
  const dailyY = sy + Math.ceil(ALL_LEVELS.length / gc) * (bs + gy) + 20;
  const dailyW = 160, dailyH = 44, dailyX = (W - dailyW) / 2;
  if (px >= dailyX && px <= dailyX + dailyW && py >= dailyY && py <= dailyY + dailyH) {
    ensureAudio(); sfxClick(); startDailyChallenge(); return;
  }
  // Leaderboard button
  const lbY = dailyY + dailyH + 12;
  const lbW = 160, lbH = 44, lbX = (W - lbW) / 2;
  if (px >= lbX && px <= lbX + lbW && py >= lbY && py <= lbY + lbH) {
    ensureAudio(); sfxClick();
    state.screen = SCREEN.LEADERBOARD; state.leaderboardLoading = true;
    firebase.loadLeaderboard().then(lb => { state.leaderboard = lb; state.leaderboardLoading = false; });
    return;
  }
  // Sign out button
  if (firebase.user) {
    const soY = lbY + lbH + 12;
    if (px >= lbX && px <= lbX + lbW && py >= soY && py <= soY + lbH) { ensureAudio(); sfxClick(); firebase.signOutUser(); state.screen = SCREEN.TITLE; return; }
  }
  for (let i = 0; i < ALL_LEVELS.length; i++) {
    const row = Math.floor(i / gc), col = i % gc;
    const bx = sx + col * (bs + gx), by = sy + row * (bs + gy);
    if (px >= bx && px <= bx + bs && py >= by && py <= by + bs) {
      const ln = i + 1, unlocked = ln === 1 || (state.progress[ln - 1] && state.progress[ln - 1] >= 1);
      if (unlocked) { ensureAudio(); startLevel(ln); sfxClick(); } return;
    }
  }
}

async function shareScore() {
  const lvlName = state.dailyChallenge ? 'Daily Challenge' : `level ${state.level}`;
  const text = `I scored ${state.score.toLocaleString()} on ${lvlName}! ${'★'.repeat(state.stars)} 🍬`;
  const url = 'https://ensung-park.github.io/Games/sweet-match/';
  if (navigator.share) {
    try { await navigator.share({ title: 'Sweet Match', text, url }); } catch(e) {}
  } else {
    try { await navigator.clipboard.writeText(text + ' ' + url); addFloatingText(W / 2, H / 2, 'Copied to clipboard!', '#2ed573', Math.floor(cellSize * 0.35)); } catch(e) {}

function handleOverlayClick(px, py) {
  const bw = 180, bh = 50, bx = (W - bw) / 2;

    const shareY = H * 0.55;
    if (px >= bx && px <= bx + bw && py >= shareY && py <= shareY + bh) { ensureAudio(); sfxClick(); shareScore(); return; }
    const by2 = shareY + bh + 10;
    if (!state.dailyChallenge) {
      if (px >= bx && px <= bx + bw && py >= by2 && py <= by2 + bh) { ensureAudio(); sfxClick(); state.dailyChallenge = false; if (state.level < ALL_LEVELS.length) startLevel(state.level + 1); else state.screen = SCREEN.LEVEL_SELECT; return; }
      if (px >= bx && px <= bx + bw && py >= by2 + bh + 10 && py <= by2 + bh * 2 + 10) { ensureAudio(); sfxClick(); state.dailyChallenge = false; state.screen = SCREEN.LEVEL_SELECT; return; }
    } else {
      if (px >= bx && px <= bx + bw && py >= by2 && py <= by2 + bh) { ensureAudio(); sfxClick(); state.dailyChallenge = false; state.screen = SCREEN.LEVEL_SELECT; return; }
    }

    if (px >= bx && px <= bx + bw && py >= by1 && py <= by1 + bh) { ensureAudio(); sfxClick(); if (state.dailyChallenge) startDailyChallenge(); else startLevel(state.level); return; }

function handleTitleClick(px, py) {

// Convert pointer event to canvas coordinates (handles browser chrome, scrolling, etc.)
function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
}

function onPointerDown(e) {
  e.preventDefault(); const { x: px, y: py } = pointerToCanvas(e);
  if (isSoundToggle(px, py)) { ensureAudio(); soundEnabled = !soundEnabled; try { localStorage.setItem('sweetMatchSound', soundEnabled); } catch(e) {} if (!soundEnabled) stopBgMusic(); else if (state.screen === SCREEN.PLAYING) startBgMusic(); sfxClick(); return; }
  if (state._cbBtnGame) { const cb = state._cbBtnGame; if (px >= cb.x && px <= cb.x + cb.w && py >= cb.y && py <= cb.y + cb.h) { state.colorBlindMode = !state.colorBlindMode; try { localStorage.setItem('sweetMatchColorBlind', state.colorBlindMode); } catch(e) {} sfxClick(); return; } }

  if (state.screen === SCREEN.TITLE) { handleTitleClick(px, py); return; }
  if (state.screen === SCREEN.LEVEL_SELECT) { handleLevelSelectClick(px, py); return; }
  if (state.screen === SCREEN.LEADERBOARD) return;

    const y = ((i * 89.3 + now * (6 + i * 1.5)) % (H + 100)) - 50;

function drawLevelSelect() {
  drawTitleBgCandies();
  const tg = ctx.createLinearGradient(W / 2 - 120, 0, W / 2 + 120, 0);
  tg.addColorStop(0, '#ff6bca'); tg.addColorStop(0.5, '#ffb347'); tg.addColorStop(1, '#ff6bca');
  ctx.fillStyle = tg; ctx.font = `bold ${Math.floor(cellSize * 0.6)}px 'Segoe UI', system-ui, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Sweet Match', W / 2, H * 0.07);

function drawJelly() {
  if (!state.jellyBoard) return;
  const shk = state.shakeAmount;
  const sx = shk ? Math.sin(state.shakeTime * 40) * shk : 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const j = state.jellyBoard[r][c];
      if (j <= 0) continue;
      const p = cellToScreen(r, c);
      ctx.fillStyle = j === 2 ? 'rgba(255,100,180,0.3)' : 'rgba(255,100,180,0.15)';
      drawRoundedRect(p.x - cellSize / 2 + 2 + sx, p.y - cellSize / 2 + 2 + sy, cellSize - 4, cellSize - 4, 5);
      ctx.fill();
    }
  }
}

  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.floor(cellSize * 0.5)}px 'Segoe UI', system-ui, sans-serif`;

      const bounceT = Math.min(starAge / 0.3, 1);
      const sc = bounceT < 0.5 ? 2 - bounceT * 2 : 1 + (bounceT - 0.5) * 0.3 * Math.sin(bounceT * 8);
